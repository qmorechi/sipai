<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX IP STUDIO｜團隊總表</title>
<style>
  body { font-family: 'Noto Sans TC', sans-serif; background: #0d0d0f; color: #e8e6e0;
         display: flex; flex-direction: column; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; gap: 0; }
  h1 { font-size: 28px; letter-spacing: .08em; margin-bottom: 8px; }
  h1 span { color: #c5a46b; }
  p { color: #7a7870; font-size: 13px; margin-bottom: 28px; }
  .gate-msg { color: #c5a46b; font-size: 13px; margin-bottom: 24px; min-height: 1em; }
  .links { display: flex; flex-direction: column; gap: 16px; width: 360px; transition: opacity .2s; }
  .links.locked { opacity: .35; pointer-events: none; filter: grayscale(.4); }
  a { display: block; padding: 20px 28px; background: #161618; border: 1px solid #2a2a30;
      border-radius: 10px; text-decoration: none; color: #e8e6e0; transition: border-color .2s; }
  a:hover { border-color: #c5a46b; }
  .link-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .link-desc { font-size: 12px; color: #7a7870; }
  .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 3px;
         background: rgba(197,164,107,.15); color: #c5a46b; margin-bottom: 8px;
         font-family: monospace; letter-spacing: .05em; }
</style>
</head>
<body>
  <h1>MX IP <span>STUDIO</span></h1>
  <p>六大 IP 計畫 · 主控面板</p>
  <div class="gate-msg" id="gateMsg">　</div>
  <div class="links locked" id="links">
    <a href="progress.html">
      <div class="tag">PROGRESS</div>
      <div class="link-title">六大 IP 進度總表</div>
      <div class="link-desc">每週本週進度 / 待解問題 / 下週重點。點進每個 IP 可看詳細(含角色團隊入口)</div>
    </a>
    <a href="timeline.html">
      <div class="tag">HISTORY</div>
      <div class="link-title">MX IP 整體發展歷程</div>
      <div class="link-desc">從 2026/03 起的會議決策大事紀錄,適合新成員 brief</div>
    </a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=8"></script>
<script>
// 登入門面：未登入鎖住入口卡並提示；登入後放行，登入後自動回到登出前記住的頁。
function renderGate() {
  const logged = !!(window.MXIPAuth && MXIPAuth.currentUser() && MXIPAuth.isAllowed());
  if (logged && window.MXIPAuth && MXIPAuth.consumeNext && MXIPAuth.consumeNext()) return; // 已跳轉
  document.getElementById('links').classList.toggle('locked', !logged);
  document.getElementById('gateMsg').textContent = logged ? '　' : '🔒 請用右上角「用 MX 公司帳號登入」後使用';
}
(window.MXIPAuth ? MXIPAuth.init() : Promise.resolve()).then(renderGate);
if (window.MXIPAuth && MXIPAuth.onChange) MXIPAuth.onChange(renderGate);
</script>
</body>
</html>
