<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IP 全流程 22 個專業角色互動節點圖</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0f1116;color:#fff4e3;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;}
.breadcrumb{display:flex;align-items:center;gap:10px;padding:12px 28px;font-size:12px;letter-spacing:.05em;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25);font-weight:700}
.breadcrumb a{color:#f2b35e;text-decoration:none;transition:opacity .15s}
.breadcrumb a:hover{opacity:.7}
.breadcrumb .sep{color:#5a6270;font-size:14px}
.breadcrumb .current{color:#cfc7bb}
.app{min-height:100vh;display:grid;grid-template-columns:minmax(780px,1fr) 420px;gap:0}
.map{padding:28px 28px 34px;overflow:auto}
header{display:flex;justify-content:space-between;gap:24px;align-items:flex-start;margin-bottom:22px}
h1{font-size:34px;line-height:1.12;margin:0 0 8px}
.lead{margin:0;color:#cfc7bb;font-weight:650;line-height:1.45}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:7px 10px;font-weight:900;font-size:13px;background:#1d222b}
.flow{display:grid;grid-template-columns:repeat(4,minmax(260px,1fr));gap:18px;min-width:1120px}
.phase{border:1px solid rgba(255,255,255,.15);background:linear-gradient(180deg,#181c24,#12151b);border-radius:20px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative;min-height:620px}
.phase h2{margin:0 0 8px;font-size:21px}
.phase p{margin:0 0 14px;color:#cfc7bb;font-size:14px;line-height:1.45}
.nodes{display:grid;gap:10px}
button.node{appearance:none;border:1px solid rgba(255,255,255,.12);background:#20242c;color:#fff4e3;text-align:left;border-radius:14px;padding:11px 12px;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.18);transition:.15s transform,.15s border,.15s background;width:100%}
button.node:hover{transform:translateY(-1px);border-color:var(--c)}
button.node.active{border-color:var(--c);box-shadow:0 0 0 2px color-mix(in srgb,var(--c),transparent 70%),0 16px 36px rgba(0,0,0,.28)}
button.node.mine{background:color-mix(in srgb,var(--c),#20242c 72%);border-color:color-mix(in srgb,var(--c),transparent 35%)}
button.node.mine .node-title::after{content:"★ 我的";font-size:11px;font-weight:900;color:var(--c);margin-left:8px;vertical-align:middle}
.num{display:inline-grid;place-items:center;width:34px;height:22px;border-radius:999px;background:var(--c);color:#111318;font-weight:950;font-size:12px;margin-right:8px}
.node-title{font-weight:950;font-size:16px}
.node-en{display:block;margin:6px 0 0 42px;color:#b9c2cf;font-size:12px;font-weight:750}

/* ── 成員列 ── */
.node-members{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0 0 42px;min-height:0}
.member-tag{display:inline-flex;align-items:center;gap:4px;background:color-mix(in srgb,var(--c),transparent 80%);border:1px solid color-mix(in srgb,var(--c),transparent 40%);border-radius:999px;padding:3px 9px;font-size:12px;color:#fff4e3;font-weight:800;line-height:1}
.member-tag .remove-btn{cursor:pointer;color:#9ba7b5;font-size:11px;margin-left:1px;line-height:1;padding:0 2px}
.member-tag .remove-btn:hover{color:#ff8b73}

/* ── 申請加入 tag(末尾彩色,只在 ?u= 個人模式出現) ── */
.node-wrap{position:relative}
.apply-tag{display:inline-flex;align-items:center;gap:3px;background:#f2b35e;color:#111318;border:none;border-radius:999px;padding:3px 11px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;line-height:1;transition:.15s transform,.15s box-shadow;box-shadow:0 2px 8px rgba(242,179,94,.3);letter-spacing:.02em}
.apply-tag:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(242,179,94,.5)}

/* ── 側欄 ── */
.side{position:sticky;top:0;height:100vh;border-left:1px solid rgba(255,255,255,.12);background:#171b22;padding:28px;overflow:auto;transition:width .2s,padding .2s}
.app.detail-collapsed{grid-template-columns:minmax(780px,1fr) 0}
.app.detail-collapsed .side{width:0;padding:0;border-left:0;overflow:hidden}
.detail-toggle{position:fixed;top:54px;right:14px;z-index:60;font:800 12px/1 system-ui,sans-serif;padding:7px 12px;border-radius:8px;background:#242a34;border:1px solid rgba(255,255,255,.22);color:#f2b35e;cursor:pointer}
.detail-toggle:hover{border-color:#f2b35e}
.panel-kicker{font-size:13px;letter-spacing:.12em;color:#f2b35e;text-transform:uppercase;font-weight:950;margin:0 0 12px}
.side h2{font-size:30px;margin:0 0 6px;line-height:1.15}
.side .en{color:#b9c2cf;font-weight:800;margin-bottom:18px}
.badge{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 11px;background:#242a34;border:1px solid rgba(255,255,255,.12);font-weight:900;margin-bottom:18px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--c)}
.section-title{font-size:14px;color:#f8d66d;letter-spacing:.08em;text-transform:uppercase;font-weight:950;margin:22px 0 8px}
.scope{font-size:18px;line-height:1.58;color:#f4ebdc}
ul{margin:0;padding-left:1.2em;color:#d8d2c8;line-height:1.55}
li{margin:.35em 0}
.risk{border:1px solid rgba(255,139,115,.35);background:rgba(255,139,115,.08);border-radius:14px;padding:12px 13px;color:#ffe0d8;line-height:1.5}
.hint{margin-top:18px;color:#9ba7b5;font-size:13px;line-height:1.45}
.arrow{height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);margin:16px 0}

/* ── 側欄成員區塊 ── */
.side-members{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.side-member-tag{display:inline-flex;align-items:center;gap:6px;background:#242a34;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700}
.side-member-avatar{width:22px;height:22px;border-radius:50%;background:var(--c);display:grid;place-items:center;font-size:10px;font-weight:900;color:#111318}
.no-member{color:#5a6270;font-size:13px;font-style:italic}

/* ── 身份 badge（個人模式才顯示） ── */
.identity-badge{display:inline-flex;align-items:center;gap:14px;background:#1d222b;border:1px solid rgba(255,255,255,.15);border-left:4px solid var(--c-id,#f2b35e);border-radius:10px;padding:10px 16px;margin:14px 0 0;font-size:13px;color:#cfc7bb;font-weight:700;max-width:100%;flex-wrap:wrap}
.identity-badge strong{color:#fff4e3;font-size:16px;font-weight:900}
.identity-ip{color:#cfc7bb;font-weight:700;padding-left:14px;border-left:1px solid rgba(255,255,255,.15)}
.identity-hint{color:#9ba7b5;font-weight:600;font-size:12px;line-height:1.4;padding-left:14px;border-left:1px solid rgba(255,255,255,.15)}

/* ── 我的快速設定（個人模式才出現）── */
.my-panel{margin-top:16px;border:1px solid rgba(255,255,255,.12);background:#161a21;border-radius:14px;padding:14px 16px}
.mp-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9ba7b5;font-weight:900;margin-bottom:9px}
.mp-templates{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.tpl-btn{appearance:none;font-family:inherit;background:#20242c;border:1px solid rgba(255,255,255,.14);border-radius:8px;color:#fff4e3;padding:8px 12px;font-size:13px;font-weight:800;cursor:pointer;transition:.15s transform,.15s border,.15s background}
.tpl-btn:hover{transform:translateY(-1px);border-color:#f2b35e;background:#262b35}
.tpl-btn .tpl-emoji{margin-right:5px}
.tpl-btn .tpl-count{margin-left:6px;font-size:11px;color:#9ba7b5;font-weight:700}
.tpl-btn.tpl-clear{border-style:dashed;color:#9ba7b5}
.tpl-btn.tpl-clear:hover{border-color:#ff8b73;color:#ffd8cf}
/* 過載指標列 */
.mp-overload{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.ov-stat{display:flex;align-items:baseline;gap:4px;font-size:13px;color:#9ba7b5;font-weight:700}
.ov-stat .ov-num{font-size:21px;font-weight:950;color:#fff4e3}
.ov-stat .ov-of{font-size:12px;color:#5a6270;font-weight:700}
.warn-pill{padding:6px 12px;border-radius:16px;font-size:12px;font-weight:900;white-space:nowrap}
.warn-empty{background:#242a34;color:#9ba7b5}
.warn-ok{background:rgba(74,222,128,.16);color:#86efac}
.warn-mid{background:rgba(242,179,94,.20);color:#f2b35e}
.warn-high{background:rgba(255,139,115,.20);color:#ff8b73}
.ov-channels{display:flex;flex-wrap:wrap;gap:5px;flex:1;min-width:160px}
.ov-chan{display:inline-flex;align-items:center;gap:5px;background:#20242c;border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;color:#d8d2c8}
.ov-chan::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--cc,#9ba7b5)}

/* ── 載入狀態 ── */
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin-left:6px;vertical-align:middle;transition:background .3s}
.sync-dot.syncing{background:#f2b35e;animation:pulse .8s infinite}
.sync-dot.error{background:#ff8b73}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:1050px){
  .app{display:block}
  .side{position:relative;height:auto;border-left:0;border-top:1px solid rgba(255,255,255,.12)}
  .flow{grid-template-columns:1fr;min-width:0}
  .phase{min-height:0}
}
</style>

<!-- 方案 C / P1 登入層（草稿，未啟用前不影響運作） -->
<script src="vendor/supabase.js"></script>
<script src="auth.js?v=9"></script>

<div class="app">
  <main class="map">
    <header>
      <div>
        <h1>IP 建立全流程：22 個專業角色互動節點圖<span class="sync-dot" id="syncDot" title="Supabase 連線中"></span></h1>
        <p class="lead">四大流程從品牌核心、角色聖經、故事企劃到分鏡輸出；社群與商業角色會在企劃與輸出階段介入。點擊任一節點可查看該角色的專業權責。</p>
        <div class="legend" id="legend"></div>
        <div id="identity"></div>
        <div id="myPanel"></div>
      </div>
    </header>
    <section class="flow" id="flow"></section>
  </main>
  <aside class="side" id="detail"></aside>
</div>
<button class="detail-toggle" id="detailToggle" title="收合/展開右側角色詳情，避免在筆電上遮住角色欄" onclick="(function(b){var a=document.querySelector('.app');var c=a.classList.toggle('detail-collapsed');b.textContent=c?'⟨ 展開詳情':'⟩ 收合詳情';try{localStorage.setItem('mxip_roles_detail_collapsed',c?'1':'0')}catch(e){}})(this)">⟩ 收合詳情</button>
<script>try{if(localStorage.getItem('mxip_roles_detail_collapsed')==='1'){document.querySelector('.app').classList.add('detail-collapsed');var _b=document.getElementById('detailToggle');if(_b)_b.textContent='⟨ 展開詳情';}}catch(e){}</script>
<script>
// ── Supabase 設定 ──
const SB_URL  = 'https://cpzbwxgokmvayhzrvkqm.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwemJ3eGdva212YXloenJ2a3FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTY1NTYsImV4cCI6MjA5NDkzMjU1Nn0.7d_pasAywneqOxOHFGlc1dpMJcUv1BDCvhV2jYLaAGE';
// 方案 C：headers 改由 auth.js 動態產生（登入帶使用者 JWT，否則 anon）。
// 未載入 auth.js 時退回原本的 anon-only headers，確保舊行為不變。
function reqHeaders() {
  return (window.MXIPAuth && MXIPAuth.authHeaders)
    ? MXIPAuth.authHeaders()
    : { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
}

function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  dot.title = state === 'syncing' ? '同步中…' : state === 'error' ? '同步失敗，使用本地快取' : 'Supabase 已連線';
}

// ── 11 位成員（從 members.js 載入,改名單去改那邊） ──

// ── 角色資料(從 roles-data.js 載入,改資料去那邊) ──
const DATA = ROLE_DATA;

const roleById   = new Map(DATA.roles.map(r=>[r.id,r]));
const phaseColor = phase => DATA.phaseMeta[phase]?.color || '#9ba7b5';
const memberById = new Map(MEMBERS.map(m=>[m.id,m]));

// ── 5 主頻道對應（過載指標看「橫跨幾個主頻道」，定義在 roles-data.js）──
const CHANNELS     = DATA.channels || [];
const TEMPLATES    = DATA.templates || [];
const channelByKey = new Map(CHANNELS.map(c=>[c.key,c]));
const roleChannel  = new Map();
CHANNELS.forEach(c => c.ids.forEach(id => roleChannel.set(id, c.key)));

// ── 身分 = 登入帳號（不再用 ?u= 假冒）；?ip= 仍決定看哪個 IP ──
// email 規則 <id>@minimax.com.tw → 帳號名即 member_id。未登入時無身分（唯讀）。
const urlParams = new URLSearchParams(location.search);
let myUserId = null;   // 由 resolveIdentity() 依登入帳號設定
let myUser   = null;
function resolveIdentity() {
  const email = (window.MXIPAuth && MXIPAuth.isAllowed && MXIPAuth.isAllowed()) ? MXIPAuth.currentEmail() : null;
  myUserId = email ? email.split('@')[0] : null;
  myUser   = myUserId ? (memberById.get(myUserId) || null) : null;
}
const myIpId    = urlParams.get('ip') || (IPS.find(i => i.status === 'active')?.id || 'SIPAI');
const myIp      = ipById.get(myIpId) || IPS[0];

// ── 本地快取(fallback,以 IP 為單位分開存) ──
const CACHE_KEY = `mxip_role_members_${myIpId}_v3`;
function loadCache() { try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch { return {}; } }
function saveCache(a) { try { localStorage.setItem(CACHE_KEY, JSON.stringify(a)); } catch {} }
function clearCache() { try { localStorage.removeItem(CACHE_KEY); } catch {} }
// 不在啟動就吃快取：角色指派不對未登入者顯示，登入後才從伺服器載入。
let assignments = {};

// ── Supabase CRUD ──
async function sbFetch(path, opts={}) {
  // 方案 C：寫入動作要登入（RLS 啟用後生效）。未登入則引導登入並中止本次寫入。
  if (window.MXIPAuth && await MXIPAuth.guardWrite(opts)) {
    throw new Error('auth-required');
  }
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: reqHeaders(), ...opts });
  if (!res.ok) throw new Error(`${res.status}`);
  // PostgREST 的 POST/PATCH 預設回空 body → 對空字串 res.json() 會在 Safari 丟
  // 「The string did not match the expected pattern」。先讀 text、空回 null。
  if (res.status === 204) return null;
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function loadAllAssignments() {
  // 未登入：不顯示任何指派，並清掉本機快取（共用/家用瀏覽器防外洩）。
  if (window.MXIPAuth && !MXIPAuth.currentUser()) {
    assignments = {};
    clearCache();
    setSyncState('ok');
    return;
  }
  setSyncState('syncing');
  try {
    const rows = await sbFetch(`role_members?ip_id=eq.${encodeURIComponent(myIp.id)}&select=role_id,member_id&order=created_at.asc`);
    const map = {};
    rows.forEach(({ role_id, member_id }) => {
      if (!map[role_id]) map[role_id] = [];
      map[role_id].push(member_id);
    });
    assignments = map;
    saveCache(assignments);
    setSyncState('ok');
  } catch(e) {
    console.warn('Supabase load failed, using cache', e);
    setSyncState('error');
  }
}

async function addMember(roleId, memberId) {
  if (!assignments[roleId]) assignments[roleId] = [];
  if (assignments[roleId].includes(memberId)) return;
  assignments[roleId].push(memberId);
  saveCache(assignments);
  setSyncState('syncing');
  try {
    await sbFetch('role_members', {
      method: 'POST',
      body: JSON.stringify({ ip_id: myIp.id, role_id: roleId, member_id: memberId })
    });
    setSyncState('ok');
  } catch(e) {
    console.warn('Supabase write failed', e);
    setSyncState('error');
  }
}

async function removeMember(roleId, memberId) {
  if (!assignments[roleId]) return;
  assignments[roleId] = assignments[roleId].filter(id => id !== memberId);
  saveCache(assignments);
  setSyncState('syncing');
  try {
    await sbFetch(`role_members?ip_id=eq.${encodeURIComponent(myIp.id)}&role_id=eq.${roleId}&member_id=eq.${memberId}`, { method: 'DELETE' });
    setSyncState('ok');
  } catch(e) {
    console.warn('Supabase delete failed', e);
    setSyncState('error');
  }
}

function getAssigned(roleId) { return assignments[roleId] || []; }

// ── render legend ──
function renderLegend() {
  document.getElementById('legend').innerHTML = Object.entries(DATA.phaseMeta).map(([k,m]) =>
    `<span class="chip"><span style="color:${m.color}">●</span> ${m.zh}</span>`
  ).join('');
}

// ── render 身份 + IP badge ──
function renderIdentityBadge() {
  const el = document.getElementById('identity');
  if (!el) return;
  const c = DATA.phaseMeta['Brand Core'].color;
  if (myUser) {
    el.innerHTML = `<div class="identity-badge" style="--c-id:${c}">
      <span>你是:<strong>${myUser.name}</strong></span>
      <span class="identity-ip">正在看 <strong>${myIp.name}</strong></span>
      <span class="identity-hint">只能加 / 移除自己的角色,其他人的指派看得到但不能動</span>
    </div>`;
  } else {
    el.innerHTML = `<div class="identity-badge" style="--c-id:${c}">
      <span class="identity-ip">正在看 <strong>${myIp.name}</strong></span>
      <span class="identity-hint">唯讀模式 — 要加入請從 Slack 收到的個人邀請信進入</span>
    </div>`;
  }
}

// ── render flow ──
function renderFlow() {
  const el = document.getElementById('flow');
  el.innerHTML = DATA.groups.map(([phase,ids],idx) => {
    const meta = DATA.phaseMeta[phase];
    return `<article class="phase" style="--c:${meta.color}">
      <h2><span style="color:${meta.color}">0${idx+1}</span> ${meta.zh}</h2>
      <p>${meta.desc}</p>
      <div class="arrow"></div>
      <div class="nodes">${ids.map(id => nodeHTML(roleById.get(id))).join('')}</div>
    </article>`;
  }).join('');

  document.querySelectorAll('#flow .node-wrap').forEach(bindWrapHandlers);
}

// 單一 node-wrap 的事件綁定(re-render 時也用)
function bindWrapHandlers(wrap) {
  const nodeBtn = wrap.querySelector('.node-btn');
  if (nodeBtn) nodeBtn.addEventListener('click', () => selectRole(Number(nodeBtn.dataset.id)));

  // 「+ 申請加入」tag 在 .node-btn 內,要 stopPropagation 不然會觸發 selectRole
  // 只有個人模式(?u=xxx)會出現,唯讀模式沒有這顆
  const applyTag = wrap.querySelector('.apply-tag');
  if (applyTag) {
    applyTag.addEventListener('click', async e => {
      e.stopPropagation();
      e.preventDefault();
      const roleId   = Number(applyTag.dataset.roleId);
      const memberId = applyTag.dataset.memberId;
      await addMember(roleId, memberId);
      rerenderNodeWrap(roleId);
      const activeBtn = document.querySelector('.node-btn.active');
      if (activeBtn && Number(activeBtn.dataset.id) === roleId) updateSideMembers(roleId);
      renderMyPanel();
    });
  }
}

// 個人模式:加/移除自己後需要整個 wrap 重 render(因為「+加我」按鈕要消失/出現)
function rerenderNodeWrap(roleId) {
  const oldWrap = document.getElementById(`node-wrap-${roleId}`);
  if (!oldWrap) return;
  const wasActive = oldWrap.querySelector('.node-btn.active') !== null;
  const r = roleById.get(roleId);
  const tmp = document.createElement('div');
  tmp.innerHTML = nodeHTML(r);
  const newWrap = tmp.firstElementChild;
  if (wasActive) newWrap.querySelector('.node-btn')?.classList.add('active');
  oldWrap.replaceWith(newWrap);
  bindWrapHandlers(newWrap);
}

function nodeHTML(r) {
  const c = phaseColor(r.phase);
  const assigned = getAssigned(r.id);
  // tags 依加入順序;✕ 只在「自己的 tag 上」顯示,管理動作改去 console 做
  const memberTags = assigned.map(mid => {
    const m = memberById.get(mid);
    if (!m) return '';
    const canRemove = myUser && mid === myUser.id;
    return `<span class="member-tag" data-role="${r.id}" data-member="${mid}">
      ${m.name}${canRemove ? `<span class="remove-btn" data-role="${r.id}" data-member="${mid}" title="移除">✕</span>` : ''}
    </span>`;
  }).join('');

  // 「申請加入」末尾彩色 tag — 只在個人模式下顯示;沒 ?u= = 唯讀,不顯示任何 add 控制
  let applyTag = '';
  if (myUser && !assigned.includes(myUser.id)) {
    applyTag = `<span class="apply-tag apply-me" data-role-id="${r.id}" data-member-id="${myUser.id}" title="把我加進這個角色">+ 申請加入</span>`;
  }

  return `<div class="node-wrap" id="node-wrap-${r.id}" style="--c:${c}">
    <button class="node node-btn${(myUser && assigned.includes(myUser.id)) ? ' mine' : ''}" data-id="${r.id}" style="--c:${c}">
      <span class="num">${String(r.id).padStart(2,'0')}</span>
      <span class="node-title">${r.name}</span>
      <span class="node-en">${r.en}</span>
      <div class="node-members" id="node-members-${r.id}">${memberTags}${applyTag}</div>
    </button>
  </div>`;
}

function refreshNode(roleId) {
  const assigned = getAssigned(roleId);
  const memberArea = document.getElementById(`node-members-${roleId}`);
  if (!memberArea) return;
  memberArea.innerHTML = assigned.map(mid => {
    const m = memberById.get(mid);
    if (!m) return '';
    const canRemove = myUser && mid === myUser.id;
    return `<span class="member-tag">
      ${m.name}${canRemove ? `<span class="remove-btn" data-role="${roleId}" data-member="${mid}" title="移除">✕</span>` : ''}
    </span>`;
  }).join('');
  const _btn = document.querySelector('#node-wrap-' + roleId + ' .node-btn');
  if (_btn) _btn.classList.toggle('mine', !!(myUser && assigned.includes(myUser.id)));
}

function updateSideMembers(roleId) {
  const el = document.getElementById('side-members');
  if (!el) return;
  const assigned = getAssigned(roleId);
  const c = phaseColor(roleById.get(roleId).phase);
  el.innerHTML = assigned.length === 0
    ? `<span class="no-member">尚未指派成員</span>`
    : assigned.map(mid => {
        const m = memberById.get(mid);
        if (!m) return '';
        return `<span class="side-member-tag" style="--c:${c}">
          <span class="side-member-avatar">${m.short}</span>${m.name}
        </span>`;
      }).join('');
}

function selectRole(id) {
  const r = roleById.get(id);
  if (!r) return;
  document.querySelectorAll('.node-btn').forEach(b => b.classList.toggle('active', Number(b.dataset.id) === id));
  const meta = DATA.phaseMeta[r.phase];
  const detail = document.getElementById('detail');
  detail.style.setProperty('--c', meta.color);
  const assigned = getAssigned(id);
  const memberHTML = assigned.length === 0
    ? `<span class="no-member">尚未指派成員</span>`
    : assigned.map(mid => {
        const m = memberById.get(mid);
        return m ? `<span class="side-member-tag" style="--c:${meta.color}">
          <span class="side-member-avatar">${m.short}</span>${m.name}
        </span>` : '';
      }).join('');

  detail.innerHTML = `
    <p class="panel-kicker">Role Detail</p>
    <h2>${String(r.id).padStart(2,'0')}｜${r.name}</h2>
    <div class="en">${r.en}</div>
    <div class="badge"><span class="dot"></span>${meta.zh}</div>
    <div class="section-title">負責成員</div>
    <div class="side-members" id="side-members">${memberHTML}</div>
    <div class="section-title">專業權責</div>
    <div class="scope">${r.scope}</div>
    <div class="section-title">主要產出</div>
    <ul>${r.deliverables.map(x=>`<li>${x}</li>`).join('')}</ul>
    <div class="section-title">常見風險 / 為何需要它</div>
    <div class="risk">${r.risk}</div>
    <p class="hint">提示：這張圖以「四大流程」呈現，但社群與商業角色會依需求在故事企劃、分鏡、輸出階段交叉介入。</p>`;
}

// ── 我的角色（個人模式）→ 過載指標 + 職能模板 ──
function myRoleIds() {
  if (!myUser) return [];
  return DATA.roles.filter(r => getAssigned(r.id).includes(myUser.id)).map(r => r.id);
}

function computeMyOverload() {
  const ids = myRoleIds();
  const keys = new Set();
  ids.forEach(id => { const k = roleChannel.get(id); if (k) keys.add(k); });
  return { roleCount: ids.length, channelKeys: [...keys] };
}

function renderMyPanel() {
  const el = document.getElementById('myPanel');
  if (!el) return;
  if (!myUser) { el.innerHTML = ''; return; }   // 唯讀模式不顯示

  const tplBtns = TEMPLATES.map(t =>
    `<button class="tpl-btn" data-tpl="${t.key}">
      <span class="tpl-emoji">${t.emoji}</span>${t.label}<span class="tpl-count">${t.ids.length} 角色</span>
    </button>`).join('');

  const { roleCount, channelKeys } = computeMyOverload();
  const ch = channelKeys.length;
  let pillCls = 'warn-empty', pillTxt = '⚪ 尚未選擇';
  if (ch >= 4)       { pillCls = 'warn-high'; pillTxt = `🛑 強提醒 · 跨 ${ch} 個主頻道`; }
  else if (ch === 3) { pillCls = 'warn-mid';  pillTxt = '⚠️ 輕提醒 · 跨 3 個主頻道'; }
  else if (ch >= 1)  { pillCls = 'warn-ok';   pillTxt = '🟢 正常'; }

  const chanChips = channelKeys
    .map(k => channelByKey.get(k))
    .filter(Boolean)
    .map(c => `<span class="ov-chan" style="--cc:${c.color}">${c.zh}</span>`)
    .join('');

  el.innerHTML = `
    <div class="mp-label">快速套用職能模板（點一下換成這組角色，可再微調）</div>
    <div class="mp-templates">
      ${tplBtns}
      <button class="tpl-btn tpl-clear" data-tpl="__clear__">⟲ 清空我的角色</button>
    </div>
    <div class="mp-overload">
      <div class="ov-stat"><span class="ov-num">${roleCount}</span> 角色<span class="ov-of">/22</span></div>
      <div class="ov-stat"><span class="ov-num">${ch}</span><span class="ov-of">/5</span> 主頻道</div>
      <span class="warn-pill ${pillCls}">${pillTxt}</span>
      <div class="ov-channels">${chanChips}</div>
    </div>`;

  el.querySelectorAll('.tpl-btn').forEach(b =>
    b.addEventListener('click', () => applyTemplate(b.dataset.tpl)));
}

// 套用模板：把「我」的角色換成模板那組（diff 寫入，只動自己）。清空＝移除全部。
async function applyTemplate(key) {
  if (!myUser) return;
  const target    = key === '__clear__' ? [] : (TEMPLATES.find(t => t.key === key)?.ids || []);
  const current   = myRoleIds();
  const targetSet = new Set(target);
  const toAdd     = target.filter(id => !current.includes(id));
  const toRemove  = current.filter(id => !targetSet.has(id));
  if (toAdd.length === 0 && toRemove.length === 0) return;

  if (toRemove.length > 0) {
    const label = key === '__clear__' ? '清空我的角色' : TEMPLATES.find(t => t.key === key)?.label;
    const ok = confirm(`套用「${label}」會把你目前的 ${current.length} 個角色換成 ${target.length} 個（移除 ${toRemove.length}、新增 ${toAdd.length}）。確定？`);
    if (!ok) return;
  }

  for (const id of toRemove) await removeMember(id, myUser.id);
  for (const id of toAdd)    await addMember(id, myUser.id);

  const activeBtn = document.querySelector('.node-btn.active');
  const keep = activeBtn ? Number(activeBtn.dataset.id) : null;
  renderFlow();
  renderMyPanel();
  if (keep != null) selectRole(keep);
}

// ── 全域 remove 事件委派 ──
document.addEventListener('click', async e => {
  if (e.target.classList.contains('remove-btn')) {
    e.stopPropagation();
    const roleId = Number(e.target.dataset.role);
    const memberId = e.target.dataset.member;
    await removeMember(roleId, memberId);
    // 個人模式:重 render 整個 wrap(因為「+加我」要重新出現)
    if (myUser) rerenderNodeWrap(roleId);
    else refreshNode(roleId);
    const activeBtn = document.querySelector('.node-btn.active');
    if (activeBtn && Number(activeBtn.dataset.id) === roleId) updateSideMembers(roleId);
    renderMyPanel();
  }
});

// ── 啟動 ──
renderLegend();
renderIdentityBadge();
renderFlow();
renderMyPanel();
selectRole(1);
function reloadAndRender() {
  resolveIdentity();   // 依登入帳號更新「你是誰」（登入→該帳號、登出→null）
  return loadAllAssignments().then(() => {
    renderFlow(); renderMyPanel(); renderIdentityBadge();
    const a = document.querySelector('.node-btn.active');
    selectRole(a ? Number(a.dataset.id) : 1);
  });
}
(window.MXIPAuth ? MXIPAuth.init({ gate: true }) : Promise.resolve())
  .then(reloadAndRender);
// 登入/登出即時重繪：登出立刻清掉指派顯示，登入後載回。
if (window.MXIPAuth && MXIPAuth.onChange) MXIPAuth.onChange(reloadAndRender);
</script>
