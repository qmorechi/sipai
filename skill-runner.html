<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX IP STUDIO｜Skill Runner 引導式產出</title>
<style>
  :root { --bg:#0d0d0f; --panel:#161618; --panel2:#1c1c20; --line:#2a2a30;
          --gold:#c5a46b; --txt:#e8e6e0; --dim:#a3a097; --ok:#5ba89e; --warn:#f2b35e; }
  * { box-sizing: border-box; }
  html, body { height:100%; }
  body { font-family:'Noto Sans TC',system-ui,sans-serif; background:var(--bg); color:var(--txt);
         margin:0; display:flex; flex-direction:column; }
  .breadcrumb { display:flex; align-items:center; gap:10px; padding:10px 28px; font-size:12px; letter-spacing:.05em; border-bottom:1px solid var(--line); background:rgba(0,0,0,.25); font-weight:700; flex:0 0 auto; }
  .breadcrumb a { color:var(--gold); text-decoration:none; }
  .breadcrumb a:hover { opacity:.7; }
  .breadcrumb .sep { color:#5a6270; font-size:14px; }
  .breadcrumb .current { color:var(--dim); }
  header { padding:16px 28px 12px; border-bottom:1px solid var(--line); flex:0 0 auto; }
  h1 { font-size:19px; letter-spacing:.06em; margin:0 0 2px; }
  h1 span { color:var(--gold); }
  .sub { color:var(--dim); font-size:12px; }
  .banner { background:rgba(242,179,94,.12); border:1px solid rgba(242,179,94,.4); color:var(--warn);
            font-size:12px; padding:8px 12px; border-radius:8px; margin:10px 28px 0; }
  .banner.hidden { display:none; }

  .picker { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; padding:12px 28px 0; flex:0 0 auto; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:11px; color:var(--dim); letter-spacing:.04em; }
  select { background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:8px;
           padding:8px 11px; font:14px/1.4 inherit; outline:none; min-width:200px; }
  select:focus { border-color:var(--gold); }
  button { cursor:pointer; border:1px solid var(--line); border-radius:9px; padding:9px 15px; font:13px/1 inherit;
           background:var(--panel2); color:var(--txt); white-space:nowrap; }
  button:hover { border-color:var(--gold); }
  button.primary { background:var(--gold); color:#1a1408; border-color:var(--gold); font-weight:700; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  .pill { display:inline-block; font-size:10px; padding:1px 7px; border-radius:3px; font-family:monospace;
          letter-spacing:.04em; margin-left:6px; background:rgba(197,164,107,.15); color:var(--gold); }

  /* 首頁：總進度 + 角色磚塊 */
  .home { padding:14px 28px 28px; overflow:auto; flex:1 1 auto; min-height:0; }
  .home-top { display:flex; gap:12px; align-items:stretch; margin-bottom:18px; flex-wrap:wrap; }
  .pbar-wrap { background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:14px 16px; flex:1; min-width:280px; }
  .pbar-top { display:flex; justify-content:space-between; font-size:13px; margin-bottom:9px; color:var(--dim); }
  .pbar-top b { color:var(--ok); font-size:16px; }
  .pbar { height:10px; background:#0e0e10; border-radius:6px; overflow:hidden; }
  .pbar > i { display:block; height:100%; background:var(--ok); transition:width .3s; }
  /* C：我的待辦面板 */
  .todos { border:1px solid var(--gold); border-radius:12px; background:rgba(197,164,107,.07); padding:12px 15px; margin-bottom:14px; }
  .todos-h { font-size:13.5px; font-weight:800; color:var(--gold); margin-bottom:8px; }
  .todos-sub { font-size:11px; font-weight:400; color:var(--dim); margin-left:8px; }
  .todo { display:flex; align-items:center; gap:9px; padding:7px 6px; border-top:1px solid var(--line); cursor:pointer; font-size:13.5px; }
  .todo:first-of-type { border-top:none; }
  .todo input { width:16px; height:16px; accent-color:var(--gold); cursor:pointer; flex:0 0 auto; }
  .todo .tpri { flex:0 0 auto; font-size:12px; }
  .todo .titem { flex:1; line-height:1.45; }
  .todo .tdue { flex:0 0 auto; font-size:11px; color:var(--dim); background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:1px 7px; }
  .todo-doing { opacity:.6; }
  .todo-done .titem { text-decoration:line-through; color:var(--dim); }
  .tiles { display:grid; grid-template-columns:repeat(auto-fill,minmax(232px,1fr)); gap:12px; }
  .tile { border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:14px 16px;
          cursor:pointer; transition:border-color .15s, transform .1s; display:flex; flex-direction:column; }
  .tile:hover { border-color:var(--gold); transform:translateY(-1px); }
  .tile .rn { font-size:10px; font-family:monospace; color:var(--dim); letter-spacing:.03em; }
  .tile .rname { font-size:15px; font-weight:700; margin:3px 0 7px; }
  .tile .rscope { font-size:11.5px; color:var(--dim); line-height:1.55; flex:1;
                  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .tile .tbar { height:5px; background:#0e0e10; border-radius:4px; overflow:hidden; margin:11px 0 0; }
  .tile .tbar > i { display:block; height:100%; background:var(--ok); transition:width .3s; }
  .tile .tstat { margin-top:8px; display:flex; gap:8px; align-items:center; }
  .pstat { display:inline-block; font-size:11px; padding:2px 10px; border-radius:20px; }
  .s-todo{ background:rgba(122,120,112,.18); color:var(--dim); }
  .s-doing{ background:rgba(141,211,255,.16); color:#8dd3ff; }
  .s-review{ background:rgba(242,179,94,.16); color:var(--warn); }
  .s-done{ background:rgba(113,209,194,.18); color:var(--ok); }
  .wk { color:var(--ok); font-weight:700; font-size:11px; }
  .digest { display:flex; flex-direction:column; gap:10px; max-width:960px; }
  .dcard { border:1px solid var(--line); border-radius:10px; background:var(--panel); overflow:hidden; }
  .dhead { display:flex; align-items:center; gap:8px; padding:11px 14px; cursor:pointer; font-size:14px; }
  .dhead:hover { background:var(--panel2); }
  .dwk { color:var(--ok); font-size:11px; font-weight:700; width:46px; flex:0 0 auto; }
  .dtoggle { color:var(--dim); margin-left:6px; }
  .dbody { padding:8px 16px 14px; border-top:1px solid var(--line); font-size:13px; line-height:1.7; max-height:420px; overflow:auto; }
  .dmsg { padding:6px 0; white-space:pre-wrap; word-break:break-word; }
  .dmsg.ai b { color:var(--gold); } .dmsg.user b { color:var(--ok); }
  .gday { margin-bottom:20px; }
  .gday h3 { font-size:13px; color:var(--gold); margin:0 0 10px; border-bottom:1px solid var(--line); padding-bottom:6px; }
  .gday h3 span { color:var(--dim); font-weight:400; font-size:11px; }
  .gimgs { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
  .gitem img { width:100%; height:140px; object-fit:cover; border-radius:8px; border:1px solid var(--line); cursor:pointer; display:block; }
  .gitem img:hover { border-color:var(--gold); }
  .gcap { font-size:10px; color:var(--dim); margin-top:4px; line-height:1.35; }

  /* 進度細表（admin）*/
  .ptable { width:100%; border-collapse:collapse; font-size:13px; max-width:880px; }
  .ptable th, .ptable td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); }
  .ptable th { color:var(--dim); font-weight:600; font-size:11px; }

  /* 對談 */
  .chat-head { display:flex; gap:14px; align-items:center; padding:12px 28px 0; flex:0 0 auto; }
  .chat-role { font-size:14px; color:var(--dim); }
  .chat-role b { color:var(--txt); }
  .chat-prog { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:12px; color:var(--dim); }
  .chat-prog .cbar { width:130px; height:6px; background:#0e0e10; border-radius:4px; overflow:hidden; }
  .chat-prog .cbar > i { display:block; height:100%; background:var(--ok); transition:width .3s; }
  .runner { display:grid; grid-template-columns:230px 1fr 320px; gap:18px; padding:12px 28px 0; flex:1 1 auto; min-height:0; }
  .refpanel { border:1px solid var(--line); border-radius:10px; background:var(--panel); padding:10px; overflow:auto; }
  .refpanel .ref-h { font-size:12px; color:var(--dim); margin:0 2px 8px; font-weight:600; }
  .home-gallery { margin-top:22px; }
  .home-gallery .ref-h { font-size:13px; color:var(--gold); font-weight:700; margin:0 0 12px; }
  .wktabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .wktab { cursor:pointer; border:1px solid var(--line); background:var(--panel2); color:var(--dim); border-radius:999px; padding:5px 11px; font:12px/1 inherit; }
  .wktab:hover { border-color:var(--gold); }
  .wktab.on { border-color:var(--gold); color:var(--gold); }
  .refgrid { grid-template-columns:repeat(auto-fill,minmax(118px,1fr)) !important; }
  .refgrid .gitem img { height:96px; }
  .guide { border:1px solid var(--line); border-radius:10px; background:var(--panel); padding:10px; overflow:auto; }
  .guide h3 { font-size:12px; color:var(--dim); margin:2px 6px 8px; letter-spacing:.05em; font-weight:600; }
  .guide .focus { font-size:11px; color:var(--ok); margin:0 6px 10px; line-height:1.6; }
  .covbox { border:1px solid var(--line); border-radius:8px; background:var(--panel2); padding:9px 10px; margin:0 0 10px; }
  .covbox h3 { font-size:11px; color:var(--ok); margin:0 0 7px; letter-spacing:.03em; font-weight:600; }
  .covrow { font-size:12px; color:var(--dim); padding:3px 0; line-height:1.45; }
  .gstep { display:flex; gap:8px; align-items:flex-start; padding:7px 8px; border-radius:7px; font-size:12.5px; color:var(--dim); }
  .gstep .n { width:18px; height:18px; border-radius:50%; border:1px solid var(--line); flex:0 0 auto;
              display:flex; align-items:center; justify-content:center; font-size:10px; }
  .gstep .cmd { font-family:monospace; font-size:10px; opacity:.55; }
  .chat { display:flex; flex-direction:column; min-height:0; }
  .msgs { flex:1 1 auto; overflow:auto; padding:6px 4px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:86%; padding:11px 14px; border-radius:12px; font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
  .msg.ai { align-self:flex-start; background:var(--panel); border:1px solid var(--line); border-top-left-radius:3px; }
  .msg.user { align-self:flex-end; background:rgba(197,164,107,.14); border:1px solid rgba(197,164,107,.35); border-top-right-radius:3px; }
  .msg .who { font-size:10px; color:var(--dim); margin-bottom:4px; }
  .msg strong { color:var(--gold); }
  .typing { align-self:flex-start; color:var(--dim); font-size:13px; padding:6px 4px; }
  .composer { flex:0 0 auto; display:flex; gap:8px; align-items:flex-end; padding:10px 0 4px; }
  .composer textarea { flex:1; background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:10px;
    padding:11px 13px; font:14px/1.5 inherit; outline:none; resize:none; min-height:48px; max-height:160px; }
  .composer textarea:focus { border-color:var(--gold); }
  .attach-btn { cursor:pointer; border:1px solid var(--line); border-radius:10px; padding:11px 13px; background:var(--panel2); font-size:17px; line-height:1; }
  .attach-btn:hover { border-color:var(--gold); }
  .attach-row { display:flex; gap:8px; flex-wrap:wrap; padding:4px 0 0; }
  .thumb { position:relative; }
  .thumb img { width:54px; height:54px; object-fit:cover; border-radius:8px; border:1px solid var(--line); display:block; }
  .thumb button { position:absolute; top:-6px; right:-6px; width:18px; height:18px; padding:0; border-radius:50%; background:#5a3340; color:#fcc; border:0; font-size:12px; line-height:1; }
  .bimgs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px; }
  .bimgs img { max-width:180px; max-height:180px; border-radius:8px; border:1px solid var(--line); }
  .doc-chip { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:5px 9px; border-radius:7px; background:var(--panel); border:1px solid var(--line); color:var(--txt); }
  .doc-chip button { border:0; background:none; color:#fcc; cursor:pointer; padding:0 0 0 4px; font-size:12px; }
  .bdocs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px; }
  .lightbox { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; padding:24px; cursor:zoom-out; }
  .lightbox.on { display:flex; }
  .lightbox img { max-width:96%; max-height:96%; border-radius:8px; box-shadow:0 20px 70px rgba(0,0,0,.6); }
  .gitem img, .bimgs img { cursor:zoom-in; }
  .toolbar { flex:0 0 auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap; border-top:1px solid var(--line); padding:10px 0; margin-bottom:6px; }
  .savestate { font-size:11px; color:var(--dim); margin-left:auto; }
  .empty { color:var(--dim); font-size:14px; padding:48px 20px; text-align:center; line-height:1.9; }
  .empty a { color:var(--gold); }
  @media (max-width:1200px){ .runner{ grid-template-columns:230px 1fr; } .refpanel{ display:none; } }
  @media (max-width:820px){ .runner{ grid-template-columns:1fr; } .guide{ display:none; } }
</style>
</head>
<body>
<nav class="breadcrumb"><a href="index.html">MX IP STUDIO</a> <span class="sep">›</span> <span class="current">Skill Runner</span></nav>
<header>
  <h1>MX IP <span>STUDIO</span> · Skill Runner</h1>
  <div class="sub">你選的協作角色都在這。點一張磚塊，AI 顧問只帶你做那個角色那塊 —— 不是空白表單。</div>
</header>

<div class="banner hidden" id="banner"></div>

<div class="picker">
  <div class="field"><label>IP 計畫</label><select id="ipSel"></select></div>
  <button id="rolesLink" style="margin-left:auto" title="一次性選你負責的角色；之後隨時回來檢索或調整">🗂 角色選擇 / 總覽</button>
</div>

<div id="runnerArea" style="flex:1 1 auto; min-height:0; display:flex; flex-direction:column;"></div>
<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

<script src="vendor/supabase.js"></script>
<script src="auth.js?v=9"></script>
<script src="ips.js"></script>
<script src="roles-data.js"></script>
<script src="skill-flows.js"></script>
<script>
'use strict';
// ── Skill Runner（北極星）：角色磚塊牆 + AI 顧問對談 + 累積式進度 ──
// 首頁＝我選的協作角色磚塊（admin 看全部）+ 總完成度%；點磚塊進該角色 AI 對談。
// 對話存 skill_runs.responses.__chat（skill_id = skill#roleId，每角色一份）。

const CONSULT_SLUG = 'hyper-processor';
const DRIVE_SLUG = 'drive-read';   // ⚠️ 部署後若 Supabase 自動改 slug，改這裡
const SB = (window.MXIPAuth && MXIPAuth.SB_URL) || '';
const CONSULT_URL = SB + '/functions/v1/' + CONSULT_SLUG;
const DRIVE_URL = SB + '/functions/v1/' + DRIVE_SLUG;
const KICKOFF = '請開始。依我這個「指定角色」的職責，用顧問的方式一步步帶我產出我這塊的 deliverable：先用一兩句說明你是我的什麼角色顧問、會怎麼帶我，然後直接問我第一個、最該先決定的問題。一次只問一件事。';
const LBL = { todo:'未開始', doing:'進行中', review:'送審', done:'完成' };

const T = { ip:null, isAdmin:false, view:'home', skill:null, roleId:null, run:null, busy:false, online:true, pending:[], pendingDocs:[], lastDocs:null, roster:null, ipImages:null, galWeek:null };

function $(id){ return document.getElementById(id); }
function memberId(){ const e=MXIPAuth.currentEmail(); return e?e.split('@')[0]:null; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(s){ return esc(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); }
function showBanner(msg){ const b=$('banner'); if(!msg){ b.classList.add('hidden'); return; } b.innerHTML=msg; b.classList.remove('hidden'); }
function pad2(n){ return (n<10?'0':'')+n; }
function roleById(id){ return ROLE_DATA.roles.find(r=>r.id===id); }
function ipName(id){ const m=(typeof IPS!=='undefined'?IPS:[]).find(x=>x.id===id); return m?m.name:id; }

// ── 附圖：圖片縮圖、影片抽關鍵影格（皆在前端轉成 jpeg dataURL）──
function toPayload(d){ const m=/^data:(image\/[a-z]+);base64,(.+)$/.exec(d||''); return m?{media_type:m[1],data:m[2]}:null; }
function scaleCanvas(srcW,srcH){ const max=1280; const sc=Math.min(1,max/Math.max(srcW,srcH)); const c=document.createElement('canvas'); c.width=Math.max(1,Math.round(srcW*sc)); c.height=Math.max(1,Math.round(srcH*sc)); return c; }
function imageToDataUrl(file){ return new Promise(res=>{ const img=new Image(); img.onload=()=>{ try{ const c=scaleCanvas(img.width,img.height); c.getContext('2d').drawImage(img,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',0.85)); }catch(e){ res(null); } }; img.onerror=()=>res(null); img.src=URL.createObjectURL(file); }); }
function extractFrames(file,n){ n=n||4; return new Promise(res=>{ const v=document.createElement('video'); v.preload='metadata'; v.muted=true; v.playsInline=true; v.src=URL.createObjectURL(file); const frames=[]; let times=[],idx=0;
  v.onloadedmetadata=()=>{ const dur=v.duration||0; if(!dur||!isFinite(dur)){ res(frames); return; } for(let i=1;i<=n;i++) times.push(dur*i/(n+1)); seek(); };
  function seek(){ if(idx>=times.length){ try{URL.revokeObjectURL(v.src);}catch(e){} res(frames); return; } v.currentTime=times[idx]; }
  v.onseeked=()=>{ try{ const c=scaleCanvas(v.videoWidth,v.videoHeight); c.getContext('2d').drawImage(v,0,0,c.width,c.height); frames.push(c.toDataURL('image/jpeg',0.82)); }catch(e){} idx++; seek(); };
  v.onerror=()=>res(frames); }); }
function fileToBase64(file){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>{ const s=String(r.result||''); const i=s.indexOf(','); res(i>=0?s.slice(i+1):''); }; r.onerror=()=>res(''); r.readAsDataURL(file); }); }
async function addFiles(files){
  const list=Array.from(files||[]); if(!list.length) return;
  for(const f of list){
    try{
      if(f.type.indexOf('image/')===0){ const d=await imageToDataUrl(f); if(d) T.pending.push(d); }
      else if(f.type.indexOf('video/')===0){ const fr=await extractFrames(f,4); fr.forEach(d=>{ if(d) T.pending.push(d); }); }
      else if(f.type==='application/pdf'){ if(f.size>30*1024*1024){ alert('PDF 太大（>30MB）：'+f.name+'，請拆小或先擷取重點頁'); continue; } const data=await fileToBase64(f); if(data) T.pendingDocs.push({name:f.name, data:data}); }
    }catch(e){}
  }
  if(T.pending.length>8) T.pending=T.pending.slice(0,8);
  if(T.pendingDocs.length>5) T.pendingDocs=T.pendingDocs.slice(0,5);
  renderChat();
}

function fillIpSelect(){
  const sel=$('ipSel');
  const ips=(typeof IPS!=='undefined'?IPS:[]).slice().sort((a,b)=>(a.order_no||99)-(b.order_no||99));
  sel.innerHTML=ips.map(ip=>'<option value="'+esc(ip.id)+'">'+esc(ip.name)+(ip.status&&ip.status!=='active'?'（'+ip.status+'）':'')+'</option>').join('');
}
async function rolesForIp(ip){
  const id=memberId(); if(!id) return [];
  try{ const r=await fetch(SB+'/rest/v1/role_members?member_id=eq.'+encodeURIComponent(id)+'&ip_id=eq.'+encodeURIComponent(ip)+'&select=role_id',{headers:MXIPAuth.authHeaders()});
    if(r.ok){ T.online=true; return (await r.json()).map(x=>x.role_id); } T.online=false; return []; }catch(e){ T.online=false; return []; }
}
async function myRunsForIp(ip){
  try{ const r=await fetch(SB+'/rest/v1/skill_runs?member_id=eq.'+encodeURIComponent(memberId())+'&ip_id=eq.'+encodeURIComponent(ip)+'&select=skill_id,status,updated_at,coverage:responses->__coverage',{headers:MXIPAuth.authHeaders()});
    if(r.ok){ T.online=true; return await r.json(); } T.online=false; return []; }catch(e){ T.online=false; return []; }
}

// ── 首頁：磚塊牆 ──
async function renderHome(){
  T.view='home';
  const area=$('runnerArea');
  area.innerHTML='<div class="empty">載入中…</div>';
  if(!T.ip){ area.innerHTML='<div class="empty">請先選 IP。</div>'; return; }
  const roleIds = T.isAdmin ? ROLE_DATA.roles.map(r=>r.id) : await rolesForIp(T.ip);
  const runs = await myRunsForIp(T.ip);
  const rmap={}; runs.forEach(x=>{ rmap[x.skill_id]=x; });
  if(!T.online) showBanner('⚠️ 連不到雲端，進度與對話暫時只存本機，恢復後自動同步。'); else showBanner('');
  const wk=Date.now()-7*864e5;
  // 累積式 + 真實覆蓋率：狀態與完成度都看 AI 評的交付項覆蓋率，而非自填。
  function covOf(id){ const sk=ROLE_SKILL[id]; const run=sk?rmap[sk+'#'+id]:null;
    const r=roleById(id); const total=(r&&r.deliverables)?r.deliverables.length:0;
    const cov=(run&&Array.isArray(run.coverage))?run.coverage:[];
    const covered=cov.filter(c=>c&&c.status==='covered').length;
    const partial=cov.filter(c=>c&&c.status==='partial').length;
    let s='todo'; if(total&&covered>=total) s='done'; else if(covered>0||partial>0||run) s='doing';
    const up=run&&run.updated_at?new Date(run.updated_at):null;
    return { s:s, covered:covered, partial:partial, total:total, wk:!!(up&&up.getTime()>=wk) }; }
  if(!roleIds.length){
    area.innerHTML='<div class="home"><div class="empty">你在這個 IP 還沒有指定角色。<br>請先到 <a href="roles.html?u='+esc(memberId())+'&ip='+esc(T.ip)+'">角色選擇頁</a> 選好你的角色，再回來。</div></div>';
    return;
  }
  const ids=roleIds.slice().sort((a,b)=>a-b);
  const cmap={}; ids.forEach(id=>{ cmap[id]=covOf(id); });
  let sumCov=0,sumTot=0,done=0; ids.forEach(id=>{ const c=cmap[id]; sumCov+=c.covered+0.5*c.partial; sumTot+=c.total; if(c.s==='done')done++; });
  const pct=sumTot?Math.round(sumCov/sumTot*100):0;
  let html='<div class="home"><div class="home-top">'
    +'<div class="pbar-wrap"><div class="pbar-top"><span>'+(T.isAdmin?'全部角色':'我的協作角色')+'　實質完成度（交付項覆蓋率）</span><span><b>'+pct+'%</b>　完成角色 '+done+' / '+ids.length+'</span></div><div class="pbar"><i style="width:'+pct+'%"></i></div></div>'
    + '<button id="digestBtn">📋 本週成果</button>'
    + (T.isAdmin?'<button id="teamBtn">📊 全 IP 進度表</button>':'')
    + '</div><div id="myTodos"></div><div class="tiles">'
    + ids.map(id=>{ const r=roleById(id); if(!r) return ''; const c=cmap[id]; const sk=ROLE_SKILL[id];
        const tp=c.total?Math.round((c.covered+0.5*c.partial)/c.total*100):0;
        return '<div class="tile" data-id="'+id+'"><div class="rn">'+pad2(id)+'　'+esc(SKILL_FLOWS[sk].label)+'</div>'
          +'<div class="rname">'+esc(r.name)+'</div><div class="rscope">'+esc(r.scope)+'</div>'
          +'<div class="tbar"><i style="width:'+tp+'%"></i></div>'
          +'<div class="tstat"><span class="pstat s-'+c.s+'">'+LBL[c.s]+'</span><span style="font-size:11px;color:var(--dim)">'+tp+'%・涵蓋 '+c.covered+'/'+c.total+'</span>'+(c.wk?'<span class="wk">● 本週</span>':'')+'</div></div>';
      }).join('')
    + '</div><div class="home-gallery" id="homeGallery"></div></div>';
  area.innerHTML=html;
  document.querySelectorAll('.tile').forEach(t=>t.onclick=()=>openRole(+t.dataset.id));
  if($('teamBtn')) $('teamBtn').onclick=()=>renderTeamTable();
  if($('digestBtn')) $('digestBtn').onclick=()=>renderWeeklyDigest();
  fillGallery('homeGallery', true);
  loadMyTodos();
}

async function loadGallery(){

  let runs=[];
  try{
    const r=await fetch(SB+'/rest/v1/skill_runs?ip_id=eq.'+encodeURIComponent(T.ip)+'&select=member_id,skill_id,updated_at,responses&order=updated_at.desc&limit=40',{headers:MXIPAuth.authHeaders()});

  const items=[];
  runs.forEach(run=>{
    const ch=(run.responses&&run.responses.__chat)||[];
    const rid=(run.skill_id&&run.skill_id.indexOf('#')>=0)?+run.skill_id.split('#')[1]:null;

function weekStart(ts){ const d=new Date(ts); d.setHours(0,0,0,0); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return d.getTime(); }
function weekLabel(ws){ const a=new Date(ws), b=new Date(ws+6*864e5), f=(x)=>(x.getMonth()+1)+'/'+x.getDate();
  return (ws===weekStart(Date.now())?'本週 ':'')+f(a)+'–'+f(b); }
function galleryHTML(items, big){
  if(!items.length) return '<div class="empty" style="padding:22px">這個 IP 還沒有參考圖。對談時用 📎 上傳圖/手稿，就會出現在這裡（可依週瀏覽比較）。</div>';
  const g={}; items.forEach(it=>{ const k=weekStart(it.ts); (g[k]=g[k]||[]).push(it); });
  const keys=Object.keys(g).map(Number).sort((a,b)=>b-a);
  if(T.galWeek==null || keys.indexOf(T.galWeek)<0) T.galWeek=keys[0];
  const sel=g[T.galWeek]||[];
  const tabs='<div class="wktabs">'+keys.map(k=>'<button class="wktab'+(k===T.galWeek?' on':'')+'" data-wk="'+k+'">'+esc(weekLabel(k))+'・'+g[k].length+'</button>').join('')+'</div>';
  const grid='<div class="gimgs'+(big?'':' refgrid')+'">'+sel.map(it=>'<div class="gitem"><img src="'+it.src+'" loading="lazy" title="點擊放大"><div class="gcap">'+esc(it.role)+'　'+esc(it.member)+'　'+new Date(it.ts).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'})+'</div></div>').join('')+'</div>';
  return tabs+grid;
}
async function fillGallery(elId, big){

// ── 進入某角色的對談 ──
async function fetchIpRoster(ip){

    const r=await fetch(SB+'/rest/v1/skill_runs?ip_id=eq.'+encodeURIComponent(ip)+'&skill_id=like.brand-core*&select=roster:responses->__roster',{headers:MXIPAuth.authHeaders()});

    const rows=await r.json();

async function openRole(id){
  if(T.busy) return;
  T.roleId=id; T.skill=ROLE_SKILL[id]; T.view='chat';
  // 故事/分鏡流程：帶入該 IP 由品牌核心產出的角色名冊，讓顧問「養完梗才選角」。
  T.roster = (T.skill==='storyboard-workflow') ? await fetchIpRoster(T.ip) : null;

// ── run 載入/儲存 ──
function runKey(){ return T.skill + (T.roleId ? '#'+T.roleId : ''); }
function lsKey(){ return 'mxip_chat_'+memberId()+'_'+T.ip+'_'+runKey(); }
function blankRun(){ return { member_id:memberId(), ip_id:T.ip, skill_id:runKey(), responses:{__chat:[]}, current_stage:0, status:'draft' }; }
function chat(){ return (T.run && T.run.responses && T.run.responses.__chat) || []; }
async function loadRun(){
  T.run=null; let loaded=false;
  try{
    const url=SB+'/rest/v1/skill_runs?member_id=eq.'+encodeURIComponent(memberId())+'&ip_id=eq.'+encodeURIComponent(T.ip)+'&skill_id=eq.'+encodeURIComponent(runKey())+'&select=*';
    const r=await fetch(url,{ headers:MXIPAuth.authHeaders() });
    if(r.ok){ T.online=true; const rows=await r.json(); if(rows.length){ T.run=rows[0]; loaded=true; } } else T.online=false;
  }catch(e){ T.online=false; }
  if(!loaded){ try{ const raw=localStorage.getItem(lsKey()); if(raw){ T.run=JSON.parse(raw); loaded=true; } }catch(e){} }
  if(!T.run) T.run=blankRun();
  if(!T.run.responses) T.run.responses={};
  if(!T.run.responses.__chat) T.run.responses.__chat=[];
}
function persistLocal(){ try{ localStorage.setItem(lsKey(), JSON.stringify(T.run)); }catch(e){} }
async function saveRun(){
  T.run.member_id=memberId(); T.run.ip_id=T.ip; T.run.skill_id=runKey();
  persistLocal();
  if(!T.online){ markSaved('已存本機'); return; }
  try{
    const body={ member_id:T.run.member_id, ip_id:T.run.ip_id, skill_id:T.run.skill_id, responses:T.run.responses, current_stage:T.run.current_stage, status:T.run.status, updated_at:new Date().toISOString() };
    const r=await fetch(SB+'/rest/v1/skill_runs?on_conflict=member_id,ip_id,skill_id',{ method:'POST', headers:MXIPAuth.authHeaders({'Prefer':'resolution=merge-duplicates,return=representation'}), body:JSON.stringify(body) });
    if(r.ok){ const rows=await r.json(); if(rows&&rows[0]) T.run.id=rows[0].id; markSaved('已存雲端 ✓'); } else { T.online=false; markSaved('已存本機'); }
  }catch(e){ T.online=false; markSaved('已存本機'); }
}
function markSaved(t){ const el=$('saveState'); if(el) el.textContent=t+'　'+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}); }

// ── AI 顧問 ──
function buildBrief(){
  const f=SKILL_FLOWS[T.skill];
  return { id:T.skill, label:f.label, summary:f.summary, outputs:f.outputs,
    stages:f.stages.map(s=>({ cmd:s.cmd, title:s.title, intro:s.intro||'', optional:!!s.optional, repeatable:!!s.repeatable, fields:s.fields.map(fl=>fl.label+(fl.required?'*':'')) })) };
}
function buildRoleFocus(){ if(!T.roleId) return null; const r=roleById(T.roleId); if(!r) return null;
  return { id:r.id, name:r.name, en:r.en, scope:r.scope, deliverables:r.deliverables, risk:r.risk }; }
// 交件通知（單向推 Slack 戰報；fire-and-forget，不阻塞 UI）
async function notifyDone(){
  try{
    const r=T.roleId?roleById(T.roleId):null;
    const role=r?r.name:((SKILL_FLOWS[T.skill]||{}).label||T.skill);
    const items=(r&&r.deliverables)||[]; const cov=(T.run&&T.run.responses&&T.run.responses.__coverage)||[];
    const covered=items.filter((d,i)=>cov[i]&&cov[i].status==='covered').length;
    const pct=items.length?Math.round(covered/items.length*100):100;
    await fetch(CONSULT_URL,{ method:'POST', headers:MXIPAuth.authHeaders(),
      body:JSON.stringify({ action:'notify', event:'role_done', member:memberId(), ipName:ipName(T.ip), roleName:role, pct:pct }) });
  }catch(e){}
}
async function callConsult(){
  const arr=chat();
  const msgs=arr.map(m=>({ role:m.role, content:m.content }));
  const last=arr[arr.length-1];
  const images=(last&&last.role==='user'&&Array.isArray(last.images))?last.images.map(toPayload).filter(Boolean):[];
  const docs=Array.isArray(T.lastDocs)?T.lastDocs.map(d=>({name:d.name,data:d.data})):[]; T.lastDocs=null;
  const r=await fetch(CONSULT_URL,{ method:'POST', headers:MXIPAuth.authHeaders(), body:JSON.stringify({ skillBrief:buildBrief(), roleFocus:buildRoleFocus(), roster:T.roster, messages:msgs, images:images, docs:docs }) });
  let data={}; try{ data=await r.json(); }catch(e){}
  if(!r.ok || data.error){ const d=data.error||('HTTP '+r.status); throw new Error(typeof d==='string'?d:JSON.stringify(d)); }
  return { text:(data.text||'').trim()||'（顧問沒有回覆內容，請再試一次）', coverage:(Array.isArray(data.coverage)?data.coverage:null), roster:(Array.isArray(data.roster)?data.roster:null) };
}

// ── 對談渲染 ──
function renderCovBox(){
  if(!T.roleId) return '';
  const r=roleById(T.roleId); const items=(r&&r.deliverables)||[];
  if(!items.length) return '';
  const cov=(T.run&&T.run.responses&&T.run.responses.__coverage)||[];
  const ic={covered:'<span style="color:var(--ok)">✓</span>',partial:'<span style="color:var(--warn)">◑</span>',todo:'<span style="color:var(--dim)">○</span>'};
  const covered=items.filter((d,i)=>cov[i]&&cov[i].status==='covered').length;
  return '<div class="covbox"><h3>你的交付項覆蓋率（'+covered+'/'+items.length+'）</h3>'
    + items.map((d,i)=>{ const st=(cov[i]&&cov[i].status)||'todo'; return '<div class="covrow">'+(ic[st]||ic.todo)+' '+esc(d)+'</div>'; }).join('')
    + '</div>';
}
function links(){ return (T.run && T.run.responses && Array.isArray(T.run.responses.__links)) ? T.run.responses.__links : []; }
// 🔗 提案連結：ChatGPT/Gemini/Doc/Figma/Drive 的提案原檔連結，存 responses.__links，開會包會顯示給大家點開
function renderLinks(){
  if(!T.roleId) return '';
  const ls=links();
  return '<div class="covbox"><h3>🔗 提案連結（'+ls.length+'）</h3>'
    + '<div style="font-size:11px;color:var(--dim);margin:-4px 0 7px">貼上你提案的原檔連結（ChatGPT/Gemini/Google Doc/Figma/Drive…）。開會包會顯示給大家點開、保留你的原始格式。</div>'
    + ls.map((u,i)=>'<div class="covrow" style="display:flex;justify-content:space-between;align-items:center;gap:6px"><a href="'+esc(u)+'" target="_blank" rel="noopener" style="color:#8dd3ff;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">🔗 '+esc(u)+'</a><button data-rml="'+i+'" title="移除" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:15px">×</button></div>').join('')
    + '<button id="addLinkBtn" style="margin-top:6px;background:#20242c;border:1px solid rgba(255,255,255,.14);border-radius:7px;color:#e8e6e0;font-family:inherit;font-size:12px;font-weight:700;padding:6px 11px;cursor:pointer">+ 加提案連結</button>'
    + '</div>';
}
// 📦 正式提案狀態：依 skill 規格彙整的統一提案（存 responses.__deliverable），開會包會顯示
function renderDeliverable(){
  if(!T.roleId) return '';
  const d=T.run&&T.run.responses&&T.run.responses.__deliverable;
  if(!d||!d.text) return '<div class="covbox" style="border:1px solid rgba(242,179,94,.3)"><h3>📦 正式提案</h3><div style="font-size:11.5px;color:var(--dim)">還沒彙整。對談到一段落，按下方「🧩 彙整成正式提案」依 skill 規格產出統一格式，開會包就會顯示給大家。</div></div>';
  return '<div class="covbox" style="border:1px solid rgba(113,209,194,.45)"><h3>📦 正式提案 ✅</h3><div style="font-size:11.5px;color:var(--dim)">已依 skill 規格彙整（'+esc(new Date(d.at).toLocaleString("zh-TW"))+'）。再按「彙整」會更新；狀態設「完成」即正式提交，開會包顯示這份。</div></div>';
}
function promptList(){ return (T.run && T.run.responses && Array.isArray(T.run.responses.__prompts)) ? T.run.responses.__prompts : []; }
// 🎨 生圖 Prompt 清單：彙整正式提案時若有生圖需求，顧問附 ===PROMPTS===，這裡列出讓成員選一個複製去 Gemini/ChatGPT 生圖
function renderPrompts(){
  if(!T.roleId) return '';
  const ps=promptList(); if(!ps.length) return '';
  return '<div class="covbox" style="border:1px solid rgba(141,211,255,.4)"><h3>🎨 生圖 Prompt（'+ps.length+'）· 選一個複製去生圖</h3>'
    + '<div style="font-size:11px;color:var(--dim);margin:-4px 0 7px">同畫面有 Gemini / ChatGPT 兩版時自己挑。複製後貼去生圖，圖跑好用上方「🔗 提案連結」附上。</div>'
    + ps.map((p,i)=>{ const tool=String(p.tool||'').toLowerCase();
        const badge=tool.indexOf('gemini')>=0?'<span style="background:rgba(113,209,194,.18);color:#71d1c2;font-size:10px;font-weight:800;border-radius:4px;padding:1px 6px">Gemini</span>':'<span style="background:rgba(248,214,109,.18);color:#f8d66d;font-size:10px;font-weight:800;border-radius:4px;padding:1px 6px">ChatGPT</span>';
        return '<div style="background:#1a1e25;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 10px;margin:6px 0">'
          + '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">'+badge+'<span style="font-size:12px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.use||('Prompt '+(i+1)))+'</span><button data-copyp="'+i+'" style="background:#20242c;border:1px solid rgba(255,255,255,.14);color:#e8e6e0;border-radius:6px;font-family:inherit;font-size:11px;font-weight:700;padding:3px 9px;cursor:pointer">複製</button></div>'
          + '<div style="font-size:11.5px;color:#cdd3db;white-space:pre-wrap;line-height:1.45;max-height:120px;overflow:auto">'+esc(p.prompt||'')+'</div>'
          + (p.negative?'<div style="font-size:10.5px;color:var(--dim);margin-top:4px">負面：'+esc(p.negative)+'</div>':'')
          + '</div>'; }).join('')
    + '</div>';
}
function renderGuide(){
  const f=SKILL_FLOWS[T.skill];
  const focus = T.roleId ? ('★ 你的角色：'+esc(roleById(T.roleId).name)+'　顧問只帶你做這塊，其餘階段是上下游脈絡') : '';
  return '<div class="guide">'+renderDeliverable()+renderPrompts()+renderCovBox()+renderLinks()+'<h3>流程全貌（'+f.stages.length+' 階段）</h3>'+(focus?'<div class="focus">'+focus+'</div>':'')
    + f.stages.map((s,i)=>'<div class="gstep"><span class="n">'+(i+1)+'</span><span><div>'+esc(s.title)+'</div><div class="cmd">'+esc(s.cmd)+'</div></span></div>').join('')+'</div>';
}
function bubbles(){
  return chat().filter(m=>!m.kickoff).map(m=>{
    const imgs=(m.images&&m.images.length)?'<div class="bimgs">'+m.images.map(d=>'<img src="'+d+'">').join('')+'</div>':'';
    const docs=(m.docNames&&m.docNames.length)?'<div class="bdocs">'+m.docNames.map(n=>'<span class="doc-chip">📄 '+esc(n)+'</span>').join('')+'</div>':'';
    return '<div class="msg '+(m.role==='assistant'?'ai':'user')+'"><div class="who">'+(m.role==='assistant'?'AI 顧問':'你')+'</div>'+imgs+docs+fmt(m.content)+'</div>';
  }).join('');
}
function renderChat(){
  const area=$('runnerArea');
  if(!T.skill){ renderHome(); return; }
  const r=T.roleId?roleById(T.roleId):null; const f=SKILL_FLOWS[T.skill];
  const _items=(r&&r.deliverables)||[]; const _cov=(T.run&&T.run.responses&&T.run.responses.__coverage)||[];
  const _covd=_items.filter((d,i)=>_cov[i]&&_cov[i].status==='covered').length;
  const _cpct=_items.length?Math.round(_covd/_items.length*100):0;
  area.innerHTML='<div class="chat-head"><button id="backBtn">← 我的角色</button>'
    +'<div class="chat-role">'+(r?'<b>'+esc(r.name)+'</b>（'+esc(r.en)+'）<span class="pill">'+esc(f.label)+'</span>':'<b>'+esc(f.label)+'</b>')+'</div>'
    +(r?'<div class="chat-prog"><span>覆蓋率 '+_cpct+'%・'+_covd+'/'+_items.length+'</span><div class="cbar"><i style="width:'+_cpct+'%"></i></div></div>':'')
    +'</div>'
    +'<div class="runner">'+renderGuide()+'<div class="chat">'
    +'<div class="msgs" id="msgs">'+bubbles()+(T.busy?'<div class="typing">顧問思考中…</div>':'')+'</div>'
    +((T.pending.length||T.pendingDocs.length)?'<div class="attach-row">'
        +T.pending.map((d,i)=>'<div class="thumb"><img src="'+d+'"><button data-rm="'+i+'" title="移除">×</button></div>').join('')
        +T.pendingDocs.map((d,i)=>'<div class="doc-chip">📄 '+esc(d.name)+'<button data-rmd="'+i+'" title="移除">×</button></div>').join('')
      +'</div>':'')
    +'<div class="composer"><label class="attach-btn" title="上傳參考圖 / 手稿 / 影片 / PDF（影片自動抽影格、PDF 直接給 AI 讀）">📎<input type="file" id="fileInput" accept="image/*,video/*,application/pdf" multiple hidden></label>'
    +'<button class="attach-btn" id="docBtn" type="button" title="從 Google Doc / Drive 匯入文字當素材">📄</button>'
    +'<textarea id="input" placeholder="輸入你的回覆，或上傳參考圖/手稿讓 AI 看（Enter 送出）"'+(T.busy?' disabled':'')+'></textarea>'
    +'<button class="primary" id="sendBtn"'+(T.busy?' disabled':'')+'>送出</button></div>'
    +'<div class="toolbar"><button id="deliverBtn"'+(T.busy?' disabled':'')+'>🧩 彙整成正式提案（依 skill 規格）</button>'
    +'<button id="exportMd">⬇ 匯出對話</button><button id="restartBtn">↻ 重新開始</button>'
    +'<select id="statusSel" style="min-width:auto"><option value="draft"'+(T.run.status==='draft'?' selected':'')+'>草稿</option>'
    +'<option value="in_review"'+(T.run.status==='in_review'?' selected':'')+'>送審</option>'
    +'<option value="done"'+(T.run.status==='done'?' selected':'')+'>完成</option></select>'
    +'<span class="savestate" id="saveState">—</span></div></div><div class="refpanel" id="refpanel"></div></div>';
  wire(); scrollMsgs(); fillGallery('refpanel', false);
}
function scrollMsgs(){ const m=$('msgs'); if(m) m.scrollTop=m.scrollHeight; }
function wire(){
  if($('backBtn')) $('backBtn').onclick=()=>{ if(!T.busy) renderHome(); };
  if($('fileInput')) $('fileInput').onchange=(e)=>{ addFiles(e.target.files); e.target.value=''; };
  if($('docBtn')) $('docBtn').onclick=async ()=>{
    const u=(prompt('貼上 Google Doc / Drive 連結，把裡面的文字讀進來當素材：')||'').trim();
    if(!u) return;
    if(!/^https?:\/\//i.test(u) && !/^[a-zA-Z0-9_-]{20,}$/.test(u)){ alert('請貼有效的 Google Doc / Drive 連結'); return; }
    const inp=$('input'); const old=inp?inp.placeholder:''; const btn=$('docBtn');
    if(btn) btn.textContent='⏳'; if(inp){ inp.disabled=true; inp.placeholder='從 Google Drive 讀取中…'; }
    try{
      const res=await fetch(DRIVE_URL,{method:'POST',headers:MXIPAuth.authHeaders(),body:JSON.stringify({url:u})});
      const d=await res.json().catch(()=>({}));
      if(!res.ok){ alert('讀取失敗：'+(d.error||res.status)); }
      else if(inp){ const t=(d.title?'【'+d.title+'】\n':'')+(d.text||''); inp.value=inp.value?(inp.value+'\n\n'+t):t; }
    }catch(e){ alert('讀取失敗：'+e.message); }
    if(btn) btn.textContent='📄'; if(inp){ inp.disabled=false; inp.placeholder=old; inp.focus(); }
  };
  document.querySelectorAll('[data-rm]').forEach(b=>{ b.onclick=()=>{ T.pending.splice(+b.dataset.rm,1); renderChat(); }; });
  document.querySelectorAll('[data-rmd]').forEach(b=>{ b.onclick=()=>{ T.pendingDocs.splice(+b.dataset.rmd,1); renderChat(); }; });
  if($('addLinkBtn')) $('addLinkBtn').onclick=()=>{
    const u=(prompt('貼上提案連結（ChatGPT / Gemini / Google Doc / Figma / Drive…）：')||'').trim();
    if(!u) return;
    if(!/^https?:\/\//i.test(u)){ alert('請貼有效網址（http/https 開頭）'); return; }
    if(!T.run.responses.__links) T.run.responses.__links=[];
    T.run.responses.__links.push(u); saveRun(); renderChat();
  };
  document.querySelectorAll('[data-rml]').forEach(b=>{ b.onclick=()=>{ if(T.run.responses.__links){ T.run.responses.__links.splice(+b.dataset.rml,1); saveRun(); renderChat(); } }; });
  document.querySelectorAll('[data-copyp]').forEach(b=>{ b.onclick=()=>{ const p=promptList()[+b.dataset.copyp]; if(p&&p.prompt){ try{ navigator.clipboard.writeText(p.prompt); b.textContent='已複製✓'; setTimeout(()=>{b.textContent='複製';},1200); }catch(e){ alert('複製失敗，請手動選取'); } } }; });
  document.querySelectorAll('.bimgs img').forEach(img=>{ img.onclick=()=>openLightbox(img.src); });
  const input=$('input');
  if($('sendBtn')) $('sendBtn').onclick=()=>doSend();
  if(input){ input.onkeydown=(e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); doSend(); } }; input.focus(); }
  if($('deliverBtn')) $('deliverBtn').onclick=()=>doSend(deliverInstr(), true);
  if($('exportMd')) $('exportMd').onclick=exportMarkdown;
  if($('restartBtn')) $('restartBtn').onclick=restart;
  if($('statusSel')) $('statusSel').onchange=(e)=>{ const prev=T.run.status; T.run.status=e.target.value; saveRun(); if(e.target.value==='done'&&prev!=='done') notifyDone(); };
}
// 依「這個角色 skill 定義的交付清單」結構化彙整指令 → 全公司提案格式統一
function deliverInstr(){
  const r=roleById(T.roleId); const items=(r&&r.deliverables)||[];
  const spec = items.length
    ? '\n\n請**嚴格依這個角色的交付清單逐項組織**（每一項用一個 `## 小標題`，內容寫該項的具體產出；尚未完成的標「（待補）」），讓所有人的提案格式一致：\n- '+items.join('\n- ')
    : '';
  const promptAsk = '\n\n若你這個角色的產出**需要 AI 生圖**（角色設定圖、分鏡畫面、視覺稿等），請在 deliverable 之後**另起一行 `===PROMPTS===`**，接一個 JSON 陣列，每個生圖需求一筆：{"tool":"gemini" 或 "gpt-image","use":"用途/這張要畫什麼","prompt":"完整、可直接貼去生圖的 prompt（英文佳）","negative":"防漂移/負面控制"}。**同一個畫面若 Gemini 與 ChatGPT 都適用，就各出一筆**，讓成員自己選要用哪版。沒有生圖需求就完全不要這段。';
  return '請把我這個角色目前累積的成果，彙整成一份「正式提案」deliverable：乾淨、可直接交付的 Markdown，開頭一行標題寫「'+(r?r.name:'')+' · '+ipName(T.ip)+'」。'+spec+promptAsk;
}
async function doSend(forced, asDeliverable){
  if(T.busy) return;
  const input=$('input'); const text=forced||(input?input.value.trim():'');
  const imgs=T.pending.slice(); const docs=T.pendingDocs.slice();
  if(!text && !imgs.length && !docs.length) return;
  T.lastDocs=docs;
  chat().push({ role:'user', content:(asDeliverable?'（請依 skill 規格彙整成正式提案）':(text||'（請看我上傳的附件）')), images:imgs, docNames:docs.map(d=>d.name), ts:Date.now() }); if(imgs.length) T.ipImages=null; T.pending=[]; T.pendingDocs=[]; T.busy=true; renderChat(); saveRun();
  try{ const res=await callConsult();
    let atxt=res.text, prompts=null;
    if(asDeliverable){
      const pi=atxt.indexOf('===PROMPTS===');
      if(pi>=0){ const after=atxt.slice(pi+13); atxt=atxt.slice(0,pi).trim();
        try{ const mm=after.match(/\[[\s\S]*\]/); if(mm) prompts=JSON.parse(mm[0]); }catch(_e){} }
      T.run.responses.__deliverable={ text:atxt, at:new Date().toISOString(), by:memberId() };
      if(Array.isArray(prompts)&&prompts.length) T.run.responses.__prompts=prompts; else if(pi>=0) T.run.responses.__prompts=[];
    }
    chat().push({ role:'assistant', content:atxt, deliverable:!!asDeliverable });
    if(res.coverage) T.run.responses.__coverage=res.coverage; if(res.roster && T.skill==='brand-core') T.run.responses.__roster=res.roster; }
  catch(e){ chat().push({ role:'assistant', content:'⚠️ 顧問暫時連不上：'+e.message+'\n\n（可先重試；若持續，通知管理者。）' }); }
  T.busy=false; renderChat(); saveRun();
}
async function startIfEmpty(){
  if(chat().length>0){ renderChat(); return; }
  chat().push({ role:'user', content:KICKOFF, kickoff:true }); T.busy=true; renderChat(); saveRun();
  try{ const res=await callConsult(); chat().push({ role:'assistant', content:res.text }); if(res.coverage) T.run.responses.__coverage=res.coverage; if(res.roster && T.skill==='brand-core') T.run.responses.__roster=res.roster; }
  catch(e){ chat().push({ role:'assistant', content:'⚠️ 顧問暫時連不上：'+e.message+'\n\n（後端可能尚未部署完成，稍後按「↻ 重新開始」再試。）' }); }
  T.busy=false; renderChat(); saveRun();
}
function restart(){ if(!confirm('重新開始會清空這個角色的對話，確定？')) return; T.run.responses.__chat=[]; saveRun(); startIfEmpty(); }

// ── 匯出 ──
function buildMarkdown(){
  const f=SKILL_FLOWS[T.skill]; const who=T.roleId?roleById(T.roleId).name:f.label;
  let md='# '+who+' — '+ipName(T.ip)+'\n\n> 成員：'+memberId()+'　·　流程：'+f.label+'　·　'+new Date().toLocaleString('zh-TW')+'\n\n';
  chat().filter(m=>!m.kickoff).forEach(m=>{ md+=(m.role==='assistant'?'**AI 顧問**：\n':'**你**：\n')+m.content+'\n\n---\n\n'; });
  return md;
}
function download(name,text,mime){ const b=new Blob([text],{type:mime||'text/plain;charset=utf-8'}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1500); }
function exportMarkdown(){ download((runKey()+'_'+T.ip+'_'+memberId()).replace(/[^\w\-]/g,'-')+'.md', buildMarkdown(),'text/markdown;charset=utf-8'); }

// ── 啟動 ──
async function onIpChange(){ T.ip=$('ipSel').value; await renderHome(); }
async function boot(){
  await MXIPAuth.init({ gate:true });
  if(!(MXIPAuth.currentUser() && MXIPAuth.isAllowed())) return;
  try{ T.isAdmin = await MXIPAuth.hasAnyRole(['admin']); }catch(e){ T.isAdmin=false; }
  await loadIPs();            // 動態 IP 清單（含新增/暫停；暫停 IP 仍可選來充實內容）
  fillIpSelect();
  T.ip=$('ipSel').value;
  $('ipSel').onchange=onIpChange;
  if($('rolesLink')) $('rolesLink').onclick=()=>{ location.href='roles.html?u='+encodeURIComponent(memberId())+'&ip='+encodeURIComponent(T.ip||''); };
  if($('lightbox')) $('lightbox').onclick=()=>$('lightbox').classList.remove('on');
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ const l=$('lightbox'); if(l) l.classList.remove('on'); } });
  await renderHome();
  MXIPAuth.onChange(s=>{ if(!(s&&s.user)) $('runnerArea').innerHTML='<div class="empty">已登出。</div>'; });
}
boot().catch(e=>{ console.error(e); $('runnerArea').innerHTML='<div class="empty">載入失敗：'+esc(e.message||e)+'</div>'; });
</script>
</body>
