<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX IP 計畫｜發展歷程</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0f;--surface:#161618;--surface2:#1e1e22;--border:#2a2a30;
  --text:#e8e6e0;--muted:#a3a097;
  --accent-1:#c5a46b;--accent-2:#5ba89e;--accent-3:#c96b5a;--accent-4:#8b7ec8;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
.breadcrumb{display:flex;align-items:center;gap:10px;padding:14px 60px;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:.05em;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);}
.breadcrumb a{color:var(--accent-1);text-decoration:none;font-weight:500;transition:opacity .15s;}
.breadcrumb a:hover{opacity:.7;}
.breadcrumb .sep{color:var(--muted);font-size:14px;}
.breadcrumb .current{color:var(--text);}
header{padding:48px 60px 40px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;position:relative;}
header::after{content:'';position:absolute;bottom:-1px;left:60px;width:60px;height:2px;background:var(--accent-1);}
.header-left h1{font-family:'DM Mono',monospace;font-size:clamp(20px,3vw,30px);font-weight:500;letter-spacing:.04em;line-height:1.2;}
.header-left h1 span{color:var(--accent-1);}
.header-left p{margin-top:8px;font-size:13px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.header-right{text-align:right;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;line-height:1.8;}
.wrapper{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 130px);}
.sidebar{border-right:1px solid var(--border);padding:40px 0;position:sticky;top:0;height:calc(100vh - 130px);overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:4px;}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.timeline-nav{position:relative;padding-left:40px;}
.timeline-nav::before{content:'';position:absolute;left:20px;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,var(--accent-1) 0%,var(--accent-2) 40%,var(--accent-3) 75%,var(--accent-4) 100%);opacity:.4;}
.nav-item{position:relative;padding:14px 20px 14px 0;cursor:pointer;transition:all .2s;border-radius:0 8px 8px 0;margin-right:16px;margin-bottom:4px;}
.nav-item::before{content:'';position:absolute;left:-28px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;border:2px solid;background:var(--bg);transition:all .2s;}
.nav-item.phase-1::before{border-color:var(--accent-1);}
.nav-item.phase-2::before{border-color:var(--accent-2);}
.nav-item.phase-3::before{border-color:var(--accent-3);}
.nav-item.phase-4::before{border-color:var(--accent-4);}
.nav-item.active,.nav-item:hover{background:var(--surface2);}
.nav-item.active::before{transform:translateY(-50%) scale(1.4);}
.nav-item.phase-1.active::before{background:var(--accent-1);}
.nav-item.phase-2.active::before{background:var(--accent-2);}
.nav-item.phase-3.active::before{background:var(--accent-3);}
.nav-item.phase-4.active::before{background:var(--accent-4);}
.nav-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:.06em;}
.nav-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}
.nav-tag{margin-top:5px;display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-family:'DM Mono',monospace;letter-spacing:.05em;}
.phase-1 .nav-tag{background:rgba(197,164,107,.15);color:var(--accent-1);}
.phase-2 .nav-tag{background:rgba(91,168,158,.15);color:var(--accent-2);}
.phase-3 .nav-tag{background:rgba(201,107,90,.15);color:var(--accent-3);}
.phase-4 .nav-tag{background:rgba(139,126,200,.15);color:var(--accent-4);}
.main{padding:40px 60px;overflow-y:auto;}
.session{display:none;animation:fadeIn .3s ease;}
.session.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.session-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.session-number{font-family:'DM Mono',monospace;font-size:40px;font-weight:500;line-height:1;opacity:.18;flex-shrink:0;margin-top:4px;}
.phase-1 .session-number{color:var(--accent-1);}
.phase-2 .session-number{color:var(--accent-2);}
.phase-3 .session-number{color:var(--accent-3);}
.phase-4 .session-number{color:var(--accent-4);}
.session-meta{flex:1;}
.session-date{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px;}
.session-title{font-size:clamp(18px,2.5vw,24px);font-weight:700;line-height:1.3;}
.session-subtitle{margin-top:6px;font-size:13px;color:var(--muted);}
.phase-banner{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:4px;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:.06em;margin-bottom:24px;}
.phase-1 .phase-banner{background:rgba(197,164,107,.12);color:var(--accent-1);border:1px solid rgba(197,164,107,.25);}
.phase-2 .phase-banner{background:rgba(91,168,158,.12);color:var(--accent-2);border:1px solid rgba(91,168,158,.25);}
.phase-3 .phase-banner{background:rgba(201,107,90,.12);color:var(--accent-3);border:1px solid rgba(201,107,90,.25);}
.phase-4 .phase-banner{background:rgba(139,126,200,.12);color:var(--accent-4);border:1px solid rgba(139,126,200,.25);}
.cards{display:grid;gap:16px;}
.cards-2{grid-template-columns:1fr 1fr;}
.cards-3{grid-template-columns:1fr 1fr 1fr;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;transition:border-color .2s;}
.card:hover{border-color:#3a3a42;}
.card-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.card-label::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.card.finding .card-label{color:var(--accent-2);}.card.finding .card-label::before{background:var(--accent-2);}
.card.decision .card-label{color:#6bc47a;}.card.decision .card-label::before{background:#6bc47a;}
.card.pending .card-label{color:#c4a96b;}.card.pending .card-label::before{background:#c4a96b;}
.card.ip .card-label{color:var(--accent-4);}.card.ip .card-label::before{background:var(--accent-4);}
.card-title{font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.4;}
ul.card-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
ul.card-list li{font-size:13px;color:var(--muted);padding-left:12px;position:relative;line-height:1.6;}
ul.card-list li::before{content:'—';position:absolute;left:0;color:var(--border);}
ul.card-list li strong{color:var(--text);font-weight:500;}
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin:28px 0 12px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.key-quote{margin:16px 0;padding:16px 20px;border-left:3px solid var(--accent-3);background:rgba(201,107,90,.06);border-radius:0 8px 8px 0;}
.key-quote p{font-size:14px;line-height:1.7;font-weight:400;}
.key-quote cite{display:block;margin-top:6px;font-size:12px;color:var(--muted);font-style:normal;font-family:'DM Mono',monospace;}
.status-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.status-chip{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:400;border:1px solid;}
.status-chip.done{border-color:rgba(107,196,122,.4);color:#6bc47a;background:rgba(107,196,122,.08);}
.status-chip.warn{border-color:rgba(196,169,107,.4);color:#c4a96b;background:rgba(196,169,107,.08);}
.status-chip.next{border-color:rgba(91,168,158,.4);color:var(--accent-2);background:rgba(91,168,158,.08);}
/* IP GRID */
.ip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));grid-auto-rows:300px;gap:14px;margin-top:8px;}
.ip-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform .2s,border-color .2s;display:flex;flex-direction:column;}
.ip-card:hover{transform:translateY(-2px);border-color:#3a3a42;}
.ip-image{width:100%;height:160px;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}.ip-image img{width:100%;height:100%;object-fit:cover;display:block;}
.ip-image img{width:100%;height:100%;object-fit:cover;display:block;}
.ip-image.rotate img{position:absolute;top:0;left:0;}
.ip-image.rotate img:nth-child(1){animation:rotShow1 6s infinite;}
.ip-image.rotate img:nth-child(2){animation:rotShow2 6s infinite;}
@keyframes rotShow1{0%,45%{opacity:1}55%,95%{opacity:0}100%{opacity:1}}
@keyframes rotShow2{0%,45%{opacity:0}55%,95%{opacity:1}100%{opacity:0}}
.ip-image-placeholder{font-size:32px;opacity:.3;user-select:none;}
.ip-image-hint{font-size:10px;color:var(--muted);margin-top:6px;font-family:'DM Mono',monospace;}
.ip-info{padding:14px;flex:1;display:flex;flex-direction:column;}
.ip-name{font-size:13px;font-weight:700;margin-bottom:3px;}
.ip-author{font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace;}
.ip-tagline{font-size:12px;color:var(--muted);line-height:1.5;}
.ip-score{margin-top:10px;display:flex;align-items:center;gap:6px;}
.ip-score-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.ip-score-fill{height:100%;border-radius:2px;transition:width .8s ease;}
.ip-score-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0;}
/* MYAO GALLERY */
.myao-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.myao-tab{font-family:'DM Mono',monospace;font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s;background:transparent;}
.myao-tab.active,.myao-tab:hover{border-color:var(--accent-4);color:var(--accent-4);background:rgba(139,126,200,.1);}
.myao-panel{display:none;}
.myao-panel.active{display:grid;}
.myao-panel.g2{grid-template-columns:1fr 1fr;gap:12px;}
.myao-panel.g3{grid-template-columns:1fr 1fr 1fr;gap:12px;}
.myao-panel.g4{grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.myao-panel.g1{grid-template-columns:1fr;max-width:600px;}
.mw{border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--surface);position:relative;}
.mw.sq{aspect-ratio:3/4;}
.mw.wide{aspect-ratio:4/3;}
.mw.vwide{aspect-ratio:16/9;}
.mw img{width:100%;height:100%;object-fit:cover;display:block;}
.myao-img-label{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);font-size:11px;color:rgba(255,255,255,.8);font-family:'DM Mono',monospace;}
.score-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 6px;font-family:'DM Mono',monospace;font-size:12px;}
.score-grade{font-size:14px;font-weight:700;}
@media(max-width:900px){
  .wrapper{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:24px 0;}
  .timeline-nav{display:flex;gap:8px;overflow-x:auto;padding-left:20px;padding-bottom:8px;}
  .timeline-nav::before{display:none;}
  .nav-item{flex-shrink:0;width:160px;padding:12px;border-radius:8px;margin:0;}
  .nav-item::before{display:none;}
  .cards-2,.cards-3{grid-template-columns:1fr;}
  header{padding:32px 24px 28px;flex-direction:column;gap:16px;align-items:flex-start;}
  .main{padding:28px 24px;}
  .myao-panel.g4{grid-template-columns:1fr 1fr;}
  .myao-panel.g3{grid-template-columns:1fr 1fr;}
}
/* 會後整理節點（自動接在精修 #001-#006 後，樣式獨立）*/
.mn-body{font-size:14px;line-height:1.7;color:var(--text);max-width:760px;}
.mn-body h1{font-size:18px;font-weight:700;margin:22px 0 8px;color:var(--accent-1);border-bottom:1px solid var(--border);padding-bottom:6px;}
.mn-body h2{font-size:15px;font-weight:500;margin:18px 0 6px;color:var(--accent-2);}
.mn-body h3{font-size:13px;font-weight:500;margin:12px 0 4px;color:var(--accent-3);}
.mn-body p{margin:6px 0;}
.mn-body ul{margin:6px 0;padding-left:20px;}
.mn-body li{margin:3px 0;}
.mn-body hr{border:none;border-top:1px dashed var(--border);margin:16px 0;}
.mn-body strong{color:var(--text);font-weight:500;}
.mn-body table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px;}
.mn-body th,.mn-body td{border:1px solid var(--border);padding:7px 10px;text-align:left;vertical-align:top;}
.mn-body th{background:var(--surface2);color:var(--accent-1);font-weight:500;}
.mn-body code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:.9em;}
</style>
</head>
<body>
<nav class="breadcrumb">
  <a href="index.html">MX IP STUDIO</a>
  <span class="sep">›</span>
  <span class="current">發展歷程</span>
</nav>
<header>
  <div class="header-left">
    <h1>MX&nbsp;<span>IP</span>&nbsp;計畫</h1>
    <p>SIPAI × City Monsters × MYAO ── 發展歷程節點</p>
  </div>
  <div class="header-right">2026 / 03 → 現在<br>6 場會議　6 個提案　2 條主線</div>
</header>
<div class="wrapper" id="wrapper">
  <div id="tl-gate" style="padding:56px 28px;color:#a3a097;font-size:15px;line-height:1.8">載入中…</div>
</div>

<script src="vendor/supabase.js"></script>
<script src="auth.js?v=9"></script>
<script>
function switchSipaiTab(btn, panelId) {
  btn.closest('.sipai-tabs').querySelectorAll('.sipai-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#sipai-detail .sipai-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}
function showIPDetail(name) {
  const ids = ['sipai-detail', 'city-detail', 'myao-detail', 'peeking-detail', 'ctrlz-detail', 'ahu-detail'];
  const target = name + '-detail';
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id === target) {
      el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    } else {
      el.style.display = 'none';
    }
  });
}

function show(id) {
  document.querySelectorAll('.session').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = parseInt(id.replace('s','')) - 1;
  document.querySelectorAll('.nav-item')[idx].classList.add('active');
}
function switchTab(btn, panelId) {
  btn.closest('.myao-tabs').querySelectorAll('.myao-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.myao-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}
function animateScores() {
  document.querySelectorAll('.ip-score-fill').forEach(bar => {
    const w = bar.style.width; bar.style.width = '0';
    setTimeout(() => { bar.style.width = w; }, 200);
  });
}

// 發展歷程為內部資料：登入後才從 Supabase private_pages 取回注入；未登入只見提示。
async function loadTimeline() {
  const wrap = document.getElementById('wrapper');
  if (!(window.MXIPAuth && MXIPAuth.currentUser())) {
    wrap.innerHTML = '<div id="tl-gate" style="padding:56px 28px;color:#a3a097;font-size:15px;line-height:1.8">🔒 發展歷程為內部資料，請用右上角「用 MX 公司帳號登入」後檢視。</div>';
    return;
  }
  wrap.innerHTML = '<div id="tl-gate" style="padding:56px 28px;color:#a3a097;font-size:15px;line-height:1.8">載入中…</div>';
  try {
    const res = await fetch(`${MXIPAuth.SB_URL}/rest/v1/private_pages?page_key=eq.timeline&select=html`, { headers: MXIPAuth.authHeaders() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    wrap.innerHTML = (rows[0] && rows[0].html) || '<div id="tl-gate" style="padding:56px 28px;color:#a3a097">尚無內容。</div>';
    animateScores();
    await appendMeetingNodes(wrap);
  } catch (e) {
    wrap.innerHTML = '<div id="tl-gate" style="padding:56px 28px;color:#ff8b73">載入失敗（' + e.message + '），請重新整理或重新登入。</div>';
  }
}

// ── 會後整理：把 meeting_notes 原生接成新時間節點（#007…），精修 #001-#006 不動 ──
function escTL(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function mdToHtmlTL(md){
  const lines = String(md).replace(/\r/g,'').split('\n');
  const inl = s => escTL(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>');
  let h = '', i = 0;
  while(i < lines.length){
    const ln = lines[i];
    if(/^\s*\|.*\|\s*$/.test(ln) && i+1<lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i+1])){
      const cell = r => r.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      h += '<table><thead><tr>'+cell(ln).map(c=>'<th>'+inl(c)+'</th>').join('')+'</tr></thead><tbody>'; i += 2;
      while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ h += '<tr>'+cell(lines[i]).map(c=>'<td>'+inl(c)+'</td>').join('')+'</tr>'; i++; }
      h += '</tbody></table>'; continue;
    }
    if(/^\s*[-•]\s+/.test(ln)){ h += '<ul>'; while(i<lines.length && /^\s*[-•]\s+/.test(lines[i])){ h += '<li>'+inl(lines[i].replace(/^\s*[-•]\s+/,''))+'</li>'; i++; } h += '</ul>'; continue; }
    if(/^###\s+/.test(ln)){ h += '<h3>'+inl(ln.replace(/^###\s+/,''))+'</h3>'; i++; continue; }
    if(/^##\s+/.test(ln)){ h += '<h2>'+inl(ln.replace(/^##\s+/,''))+'</h2>'; i++; continue; }
    if(/^#\s+/.test(ln)){ h += '<h1>'+inl(ln.replace(/^#\s+/,''))+'</h1>'; i++; continue; }
    if(/^\s*---+\s*$/.test(ln)){ h += '<hr>'; i++; continue; }
    if(ln.trim() === ''){ i++; continue; }
    h += '<p>'+inl(ln)+'</p>'; i++;
  }
  return h;
}
async function appendMeetingNodes(wrap){
  if(!(window.MXIPAuth && MXIPAuth.currentUser())) return;
  let rows = [];
  try{
    const r = await fetch(`${MXIPAuth.SB_URL}/rest/v1/meeting_notes?select=title,meeting_date,phase,summary,conclusions_md&order=created_at.asc`, { headers: MXIPAuth.authHeaders() });
    if(r.ok) rows = await r.json();
  }catch(e){ return; }
  if(!rows.length) return;
  const nav = wrap.querySelector('.timeline-nav');
  const firstSession = wrap.querySelector('.session');
  if(!nav || !firstSession) return;
  const main = firstSession.parentElement;
  const base = wrap.querySelectorAll('.nav-item').length;   // 精修節點數（6）
  const pcls = p => ({'問題期':'phase-1','提案期':'phase-2','驗證期':'phase-3','量產期':'phase-4'}[p] || 'phase-4');
  rows.forEach((row, i) => {
    const N = base + i + 1;
    const num = '#' + String(N).padStart(3,'0');
    const pc = pcls(row.phase);
    const title = escTL(row.title || '會後整理');
    const date = escTL(row.meeting_date || '');
    const nv = document.createElement('div');
    nv.className = 'nav-item ' + pc;
    nv.setAttribute('onclick', "show('s" + N + "')");
    nv.innerHTML = '<div class="nav-date">'+date+'</div><div class="nav-title">'+title+'</div><div class="nav-tag">'+num+' · '+escTL(row.phase||'')+'</div>';
    nav.appendChild(nv);
    const sec = document.createElement('div');
    sec.className = 'session ' + pc;
    sec.id = 's' + N;
    sec.innerHTML = '<div class="session-header"><div class="session-number">'+num+'</div>'
      + '<div class="session-meta"><div class="session-date">'+date+' · 會後整理</div>'
      + '<div class="session-title">'+title+'</div>'
      + '<div class="session-subtitle">'+escTL(row.summary||'')+'</div></div></div>'
      + '<div class="mn-body">'+mdToHtmlTL(row.conclusions_md||'')+'</div>';
    main.appendChild(sec);
  });
}

(window.MXIPAuth ? MXIPAuth.init({ gate: true }) : Promise.resolve()).then(loadTimeline);
if (window.MXIPAuth && MXIPAuth.onChange) MXIPAuth.onChange(loadTimeline);
</script>
